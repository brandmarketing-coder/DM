<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'right PRO | DM 編輯器</title>
<!-- 匯出用函式庫（html2canvas / jsPDF）改為匯出時才載入，加快初始載入：見 ensureExportLibs() -->
<!-- 商品清單與產品文案（由 tools/build-copy.mjs 從 產品圖片/ 與 產品文案 CSV 自動產生） -->
<script src="products.js"></script>
<script src="product-copy.js"></script>
<script src="i18n.js"></script>
<script src="names-en.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  background: #e2e0dc; height: 100vh; overflow: hidden; color: #333;
}

/* ── Navbar ── */
.navbar {
  height: 52px; background: #1c1c1c; color: white;
  display: flex; align-items: center; padding: 0 20px; gap: 10px;
  flex-shrink: 0; user-select: none;
}
.nav-logo { font-size: 14px; letter-spacing: 1px; color: white; font-weight: 400; display: flex; align-items: center; gap: 4px; }
.nav-logo .dot { width: 9px; height: 9px; background: #7ec850; border-radius: 50%; }
.nav-logo-img { height: 32px; width: auto; display: block; }
.nav-title { font-size: 13px; color: #888; font-weight: 300; }
.nav-spacer { flex: 1; }
.nav-btn {
  padding: 6px 14px; border-radius: 6px; cursor: pointer; border: none;
  font-size: 12px; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 5px; transition: background 0.15s;
}
.nav-btn-export { background: #3a7d44; color: white; }
.nav-btn-export:hover { background: #2d6235; }
.nav-btn-export-jpg { background: #5c8f52; color: white; }
.nav-btn-export-jpg:hover { background: #4b7543; }
.nav-btn-preview { background: transparent; color: #bbb; border: 1px solid #444; }
.nav-btn-preview:hover { border-color: #888; color: white; }

/* ── Language picker ── */
.lang-pick { display: flex; gap: 2px; margin-right: 8px; background: #2a2a2a; border-radius: 6px; padding: 2px; }
.lang-btn {
  border: none; background: transparent; color: #999; cursor: pointer;
  font-size: 12px; padding: 5px 10px; border-radius: 4px; letter-spacing: 0.5px;
  transition: background 0.15s, color 0.15s;
}
.lang-btn:hover { color: #fff; }
.lang-btn.active { background: #3a7d44; color: #fff; }

/* ── Workspace ── */
.workspace { display: flex; height: calc(100vh - 52px); }

/* ── Preview Pane ── */
.preview-pane { flex: 1; background: #d0cdc9; position: relative; overflow: hidden; }

/* ── DM Sheet wrapper: absolutely centred ── */
.dm-wrap {
  position: absolute; top: 50%; left: 50%;
  transform-origin: center center; /* transform set by JS */
}

/* ══════════════════════════════════════════
   DM SHEET  (A4: 595 × 842 px)
══════════════════════════════════════════ */
#dm-sheet {
  width: 595px; height: 842px;
  display: flex; flex-direction: column;
  background: white;
  box-shadow: 0 8px 40px rgba(0,0,0,0.28);
  overflow: hidden; /* hard clip — no scrollbars ever */
}

/* Header / Footer images */
.dm-hdr, .dm-ftr { flex-shrink: 0; line-height: 0; width: 100%; }
.dm-hdr img, .dm-ftr img { width: 100%; display: block; }

/* Content zone */
.dm-content { flex: 1; min-height: 0; display: flex; flex-direction: column; background: white; overflow: hidden; }

/* Tagline */
.dm-tagline {
  flex-shrink: 0;
  text-align: center; padding: 11px 24px 5px;
  font-size: 16px; letter-spacing: 4px; color: #666; font-weight: 300;
}
.dm-subtitle {
  flex-shrink: 0;
  text-align: center; padding: 0 24px 8px;
  font-size: 18pt; letter-spacing: 1px; color: #666; font-weight: 300;
  line-height: 1.35;
}

/* ══════════════════════════════════════════
   FOUR-GRID  (2 × 2 independent cells)
══════════════════════════════════════════ */
.dm-four-grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  padding: 2px 6px 6px;
}

.dm-cell {
  display: flex; flex-direction: column;
  padding: 8px 12px 8px;
  min-height: 0; overflow: hidden;
}
/* inner borders */
.dm-cell:nth-child(1),
.dm-cell:nth-child(3) { border-right: 1px solid #dedad6; }
.dm-cell:nth-child(1),
.dm-cell:nth-child(2) { border-bottom: 1px solid #dedad6; }

/* Image area — fixed height so text is never squeezed out */
.dm-cell-imgs {
  height: 130px; flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 4px; overflow: hidden;
}
.dm-cell-img-slot {
  min-width: 0;
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
  height: 100%;
}
.dm-cell-img-slot img {
  max-width: 100%; max-height: 100%; object-fit: contain; display: block;
}
.dm-cell-img-slot.is-main { flex: 0 0 80px; }
.dm-cell-img-slot.is-gift  { flex: 0 0 50px; }
.dm-cell-img-slot.is-main:only-child { flex: 0 0 auto; max-width: 110px; }

/* Cell text */
.dm-cell-text { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; padding-top: 4px; }
/* 文字列不可壓縮：品名過長時真正溢出以觸發自動縮放，而非把標語壓成 0（否則標語看似消失） */
.dm-cell-text > * { flex-shrink: 0; }
.dm-cell-headline { font-size: 16px; font-weight: 400; color: #1a1a1a; line-height: 1.35; margin-bottom: 2px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.dm-cell-names { font-size: 16px; color: #999; line-height: 1.5; margin-bottom: 3px; word-break: break-word; }
.dm-cell-gift-name { color: #c0bbb5; }
.dm-cell-price-row { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
.dm-cell-price     { font-size: 22px; font-weight: 400; color: #1a1a1a; letter-spacing: 0.3px; }
.dm-cell-unit      { font-size: 16px; color: #555; }
.dm-cell-orig      { font-size: 16px; color: #b5afa8; }

/* ══════════════════════════════════════════
   TWO-GRID  (2 stacked bundles)
══════════════════════════════════════════ */
.dm-two-rows { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.dm-bundle-row {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 8px 28px 10px; overflow: hidden;
}
.dm-bundle-row + .dm-bundle-row { border-top: 1px solid #dedad6; }

/* Products — each product is a column: image above, name below, bottoms aligned */
.dm-bundle-pair {
  flex: 1; min-height: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 20px; overflow: hidden; padding-bottom: 2px;
}
.dm-bprod { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.dm-bprod-img {
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
}
.dm-bprod-img img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.dm-gift-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px; background: #19322F; color: white;
  height: 24px;
  padding: 0 10px 0 11px;
  border-radius: 12px; margin-bottom: 14px;
  letter-spacing: 1px; font-style: normal; line-height: 1;
}
.dm-bprod-name {
  font-size: 16px; color: #8d8d8d; text-align: center;
  margin-top: 5px; line-height: 1.3;
  max-width: 100%; word-break: break-word;
}
/* Two-grid image sizes: gift ~2/3 height of main, bottoms align via flex-end on parent */
.dm-bundle-pair .dm-bprod.is-main .dm-bprod-img { width: 128px; height: 165px; }
.dm-bundle-pair .dm-bprod.is-gift .dm-bprod-img  { width: 85px;  height: 111px; }
/* 單一商品（無贈品）：高度同主商品以免超出容器被裁切，寬度略大維持存在感 */
.dm-bundle-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: 134px; height: 165px; }
/* 欄寬固定＝圖寬：長品名於圖寬內置中換行，與商品圖左右對齊（橫式另有覆蓋） */
.dm-bundle-pair .dm-bprod.is-main { width: 128px; }
.dm-bundle-pair .dm-bprod.is-gift { width: 85px; }
.dm-bundle-pair .dm-bprod.is-main:only-child { width: 134px; }

/* 用途說明（產品描述）：直式兩格，置中於商品與售價之間 */
.dm-bundle-desc {
  flex-shrink: 0; font-size: 16px; line-height: 1.5; color: #6f6f6f;
  text-align: center; max-width: 92%; margin: 3px auto 0; white-space: pre-line;
}
/* 橫式1 兩格：白框小、用途說明較直式縮小 */
#dm-sheet.bg-h1 .dm-bundle-desc { font-size: 12.5px; }

/* ── 外文（EN/PL）視覺平衡 ──
   官方英文品名長且全大寫：窄欄下單字被硬切斷、品名疊成高塔。
   外文改為品名整行置中於商品圖下（主商品一行＋贈品一行），並禁止單字中斷。 */
.dm-bundle-names {
  flex-shrink: 0; text-align: center; font-size: 16px; color: #8d8d8d;
  line-height: 1.4; margin: 6px auto 0; max-width: 96%;
  word-break: normal; overflow-wrap: break-word;
}
.dm-bundle-names .dm-gift-line { color: #b3ada7; }
#dm-sheet.is-landscape .dm-bundle-names { font-size: 16px; margin-top: 4px; }
/* 橫式左右兩欄：品名區固定兩行高 → 兩欄的描述/售價起始線一致 */
#dm-sheet.is-landscape .dm-bundle-names { min-height: 2.9em; }
/* 外文：所有品名禁止單字中斷（僅超長單字才折行） */
#dm-sheet.lang-latin .dm-bprod-name,
#dm-sheet.lang-latin .dm-cell-names,
#dm-sheet.lang-latin .dm-one-namecell,
#dm-sheet.lang-latin .dm-feature-name { word-break: normal; overflow-wrap: break-word; }
/* 外文一格：品名整體縮小（全大寫官方名視覺較大、且較長） */
#dm-sheet.lang-latin .dm-one-pair .dm-bprod-name { font-size: 15px; }
#dm-sheet.lang-latin.is-landscape .dm-one-namecell { font-size: 15px; }
#dm-sheet.lang-latin .dm-one-pair.has-3-prods .dm-bprod-name { font-size: 16px; }
#dm-sheet.lang-latin.is-landscape .dm-one-pair.has-3-prods .dm-one-namecell { font-size: 16px; }
/* 外文特寫（無贈品）：單行品名字級略縮 */
#dm-sheet.lang-latin.is-landscape .dm-feature-name { font-size: 16px; }

/* Bundle price */
.dm-bundle-price-row {
  flex-shrink: 0; display: flex; align-items: baseline;
  gap: 8px; flex-wrap: wrap; padding-top: 5px;
  justify-content: center;
}
.dm-headline-lbl { font-size: 18px; color: #555; letter-spacing: 0.5px; text-align: center;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 100%; }
/* 售價數字＋單位永遠成組（直式維持單行；橫式可整組獨立成一行） */
.dm-price-grp   { display: inline-flex; align-items: baseline; gap: 4px; }
.dm-price-num   { font-size: 32px; font-weight: 400; color: #1a1a1a; letter-spacing: 0.3px; }
.dm-price-unit  { font-size: 18px; color: #444; }
.dm-orig-price  { font-size: 16px; color: #b5afa8; }

/* ══════════════════════════════════════════
   ONE-GRID  (single centred product)
══════════════════════════════════════════ */
.dm-one-block {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 36px 14px; overflow: hidden;
}

/* One-grid pair: 每個商品為等寬欄（與下方用途欄對齊），圖置中、底部對齊 */
.dm-one-pair {
  flex-shrink: 0; width: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  gap: var(--colGap, 24px); overflow: hidden;
}
.dm-one-pair > .dm-bprod { flex: 1 1 0; min-width: 0; }
/* 圖片尺寸乘上 --imgScale（預設 1），供自動縮放避免長用途文字爆版 */
.dm-one-pair .dm-bprod.is-main .dm-bprod-img  { width: calc(170px * var(--imgScale, 1)); height: calc(240px * var(--imgScale, 1)); }
.dm-one-pair .dm-bprod.is-gift .dm-bprod-img   { width: calc(115px * var(--imgScale, 1)); height: calc(161px * var(--imgScale, 1)); }
.dm-one-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: calc(195px * var(--imgScale, 1)); height: calc(275px * var(--imgScale, 1)); }
.dm-one-pair .dm-bprod-name { font-size: 20px; }

/* Styling adjustments when there are 3 products in one-grid layout（欄距改由 --colGap 控制） */
.dm-one-pair.has-3-prods .dm-bprod.is-main .dm-bprod-img {
  width: calc(155px * var(--imgScale, 1));
  height: calc(220px * var(--imgScale, 1));
}
.dm-one-pair.has-3-prods .dm-bprod.is-gift .dm-bprod-img {
  width: calc(105px * var(--imgScale, 1));
  height: calc(148px * var(--imgScale, 1));
}
.dm-one-pair.has-3-prods .dm-bprod-name {
  font-size: 16px;
}
.dm-one-pair.has-3-prods .dm-gift-badge {
  font-size: 15px;
  height: 26px;
  padding: 0 12px 0 13px;
  border-radius: 13px;
  margin-bottom: 10px;
}

/* 一格「用途說明」：左右分欄（幾個商品幾欄）；主管指定 8~10pt，--usageFS 由自動縮放調整 */
.dm-one-usage {
  flex-shrink: 0; width: 100%;
  display: flex; justify-content: center; align-items: flex-start; gap: var(--colGap, 24px);
  font-size: var(--usageFS, 11pt); line-height: 1.55; color: #6f6f6f;
  padding: 8px 0 0;   /* 不加左右內距，使用途欄寬與上方商品欄完全一致 */
}
/* 每欄與上方商品同寬；用途文字區塊靠各欄左界對齊（兩段文字左邊緣一致 → 整齊兩欄、不歪）
   區塊本身為內容寬（最長行）故香調等短行不被強制換行，僅長段落於欄寬處自動換行 */
.dm-one-usage-col { flex: 1 1 0; min-width: 0; display: flex; justify-content: flex-start; }
.dm-one-usage-col:only-child { flex: 0 1 460px; justify-content: center; }
.dm-one-usage-text { display: inline-block; max-width: 100%; text-align: left; white-space: pre-line; }

.dm-one-price-row {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 10px; gap: 5px;
}
.dm-one-price-main {
  display: flex; align-items: baseline;
  gap: 8px; flex-wrap: wrap; justify-content: center;
}
/* 一格標題／促銷標語：獨立一行、置中、可換行；字級由自動縮放控制（--headlineFS） */
.dm-one-headline {
  flex-shrink: 0; width: 100%;
  font-size: var(--headlineFS, 24px); font-weight: 500; color: #555;
  text-align: center; line-height: 1.3; padding: 6px 18px 0; word-break: break-word;
}

/* One-grid specific text overrides to make them really stand out */
.is-two-grid .dm-tagline { font-size: 23pt; }
.is-one-grid .dm-tagline { font-size: 31pt; font-weight: 300; padding: 18px 24px 10px; }
.dm-one-pair .dm-gift-badge {
  font-size: 22px;
  height: 38px;
  padding: 0 18px 0 19px;
  border-radius: 19px;
  margin-bottom: 18px;
}
.dm-one-block .dm-price-num { font-size: 42px; font-weight: 500; }
.dm-one-block .dm-price-unit { font-size: 22px; }
.dm-one-block .dm-orig-price { font-size: 15px; }

/* ══════════════════════════════════════════
   EDITOR PANE
══════════════════════════════════════════ */
.editor-pane {
  width: 390px; flex-shrink: 0;
  background: white; border-left: 1px solid #d0cdc9;
  display: flex; flex-direction: column; overflow: hidden;
}
.editor-scroll { flex: 1; overflow-y: auto; }
.editor-sec { padding: 14px 14px 12px; border-bottom: 1px solid #eee; }
.editor-sec-num { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 12px; }

/* 預覽畫布載入動態（畫布就緒前顯示，載入完成後淡出移除） */
.preview-loading {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; background: #d0cdc9; color: #888; font-size: 13px; letter-spacing: 1px;
  transition: opacity 0.35s ease;
}
.preview-loading.hide { opacity: 0; pointer-events: none; }
.loading-spin {
  width: 34px; height: 34px; border: 3px solid #bdb9b3; border-top-color: #3a7d44;
  border-radius: 50%; animation: ed-spin 0.8s linear infinite;
}
@keyframes ed-spin { to { transform: rotate(360deg); } }

/* Layout picker */
.layout-pick { display: flex; gap: 8px; }
.layout-opt {
  flex: 1; border: 2px solid #e2e2e2; border-radius: 8px;
  padding: 9px 6px; cursor: pointer; text-align: center;
  transition: border-color 0.15s, background 0.15s;
}
.layout-opt:hover { border-color: #5aaa6a; }
.layout-opt.active { border-color: #3a7d44; background: #f0f7f1; }
.lt-thumb {
  width: 46px; height: 56px; margin: 0 auto 6px;
  background: #ddd; display: grid; gap: 2px; padding: 4px; border-radius: 2px;
}
.lt-thumb.lt4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.lt-thumb.lt2 { grid-template-columns: 1fr;     grid-template-rows: 1fr 1fr; }
.lt-thumb.lt1 { grid-template-columns: 1fr;     grid-template-rows: 1fr; }
.lt-thumb > div { background: white; border-radius: 1px; }
.lt-label { font-size: 12px; color: #666; }
.layout-opt.active .lt-label { color: #3a7d44; font-weight: 600; }

/* Fields */
.field-lbl { font-size: 10.5px; color: #888; margin-bottom: 3px; display: block; }
.field-input {
  width: 100%; padding: 6px 9px; border: 1px solid #ddd; border-radius: 5px;
  font-size: 12px; color: #333; outline: none; background: #fafafa;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: #5aaa6a; background: white; }

/* Block editor */
.block-ed {
  background: #f8f7f5; border-radius: 7px; padding: 10px 10px 9px;
  margin-top: 10px; border: 1px solid #ede9e5;
}
.block-ed-title { font-size: 10.5px; font-weight: 700; color: #555; margin-bottom: 9px; }

.prod-pair { display: flex; gap: 7px; margin-bottom: 8px; }
.prod-slot { flex: 1; min-width: 0; }
.prod-slot-lbl { font-size: 9.5px; color: #aaa; margin-bottom: 3px; }
.prod-thumb-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.prod-thumb {
  width: 30px; height: 30px; object-fit: contain;
  border: 1px solid #e5e5e5; border-radius: 4px; background: #f5f5f5; flex-shrink: 0;
}
.prod-sel {
  width: 100%; padding: 4px 5px; border: 1px solid #ddd; border-radius: 4px;
  font-size: 9.5px; color: #333; background: white; outline: none;
}
.prod-sel:focus { border-color: #5aaa6a; }

.price-pair { display: flex; gap: 7px; margin-top: 2px; }
.price-slot { flex: 1; }
.price-slot label { font-size: 9.5px; color: #aaa; display: block; margin-bottom: 2px; }
.price-input {
  width: 100%; padding: 5px 7px; border: 1px solid #ddd; border-radius: 4px;
  font-size: 12px; outline: none; background: #fafafa;
}
.price-input:focus { border-color: #5aaa6a; background: white; }

.headline-field { margin-bottom: 7px; }

/* Export */
.editor-footer { flex-shrink: 0; }
.btn-export-main {
  display: block; width: 100%; padding: 14px;
  background: #3a7d44; color: white; border: none;
  font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: background 0.15s;
}
.btn-export-main:hover { background: #2d6235; }
.export-note { font-size: 9.5px; color: #bbb; text-align: center; padding: 6px 10px; }

/* ── Responsive ── */

/* Medium: tablet landscape / small laptop — keep side-by-side, narrow editor */
@media (max-width: 960px) {
  .editor-pane { width: 300px; }
  .block-ed { padding: 8px 8px 7px; }
}

/* Small: tablet portrait / mobile — stack vertically, page scrolls */
@media (max-width: 700px) {
  body { height: auto; overflow: auto; }

  /* Navbar wraps if needed */
  .navbar { height: auto; flex-wrap: wrap; padding: 8px 14px; gap: 6px; }
  .nav-spacer { flex: 1 0 100%; display: none; }
  .nav-title { display: none; }

  /* Stack preview above editor */
  .workspace { flex-direction: column; height: auto; overflow: visible; }

  /* Preview: fixed height so the scaled A4 always shows */
  .preview-pane { flex: none; height: 380px; min-height: 0; }

  /* Editor: full width, flows in document */
  .editor-pane {
    width: 100%; height: auto;
    border-left: none; border-top: 1px solid #d0cdc9;
    overflow: visible; flex-shrink: 0;
  }
  .editor-scroll { overflow-y: visible; height: auto; }

  /* Product selector pair: stack vertically so dropdowns are full width */
  .prod-pair { flex-direction: column; gap: 6px; }
  .prod-sel { font-size: 11px; }

  /* Layout picker: stay horizontal, allow small size */
  .lt-thumb { width: 36px; height: 44px; }
  .lt-label { font-size: 11px; }
}

/* ══════════════════════════════════════════
   LANDSCAPE SHEET  (A4 horizontal: 842 × 595 px)
══════════════════════════════════════════ */
#dm-sheet.is-landscape {
  width: 842px; height: 595px;
  position: relative; /* absolute 子元素的定位基準 */
}
.dm-bg-full {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; object-fit: fill;
  z-index: 0; pointer-events: none;
}
/* 橫式：內容區背景透明（白底已由底圖提供），避免白框邊緣溢出綠底 */
#dm-sheet.is-landscape .dm-content { background: transparent; }
/* .dm-land-content 的座標由 renderDM() 以 inline style 注入，
   方便 html2canvas proxy 複製 innerHTML 時保留定位資訊 */

/* 橫式：標題 18px／副標 14px（涵蓋 is-two-grid 24pt 與 is-one-grid 32pt 的放大設定） */
#dm-sheet.is-landscape .dm-tagline {
  font-size: 18px; letter-spacing: 2px; font-weight: 400;
  padding: 8px 20px 4px;
}
#dm-sheet.is-landscape .dm-subtitle {
  font-size: 16px; padding: 0 20px 6px; line-height: 1.3;
}

/* 橫式：致贈標籤改小（同時覆蓋 base 24px 與 one-pair 38px 的設定） */
#dm-sheet.is-landscape .dm-gift-badge {
  font-size: 12px; height: 19px; padding: 0 9px; border-radius: 10px;
  margin-bottom: 8px;
}

/* 橫式 1-grid：白框較小，縮減內距以爭取版面高度（搭配 fitOneGrid 自動縮放） */
#dm-sheet.is-landscape .dm-one-block { padding: 4px 16px 6px; }
#dm-sheet.is-landscape .dm-one-usage { padding-top: 4px; }
/* 一格售價文字縮小 5px（NT 數字 42→37、單位 22→17） */
#dm-sheet.is-landscape .dm-one-block .dm-price-num { font-size: 37px; }
#dm-sheet.is-landscape .dm-one-block .dm-price-unit { font-size: 17px; }

/* 橫式 4-grid：格子較矮，縮小圖片區與標題字級，避免有贈品時標題/品名被裁 */
#dm-sheet.is-landscape .dm-four-grid .dm-cell-imgs { height: 84px; }
#dm-sheet.is-landscape .dm-four-grid .dm-cell-headline { font-size: 16px; }
#dm-sheet.is-landscape .dm-four-grid .dm-cell-names { font-size: 16px; }
/* 四格標題與下方格子拉開一點點距離（僅橫式2、3 有四格） */
#dm-sheet.is-landscape .dm-four-grid { margin-top: 8px; }

/* 橫式 1-grid：圖片列／品名列分開（grid），圖片底部恆對齊、品名一行時不留空行 */
#dm-sheet.is-landscape .dm-one-pair {
  display: grid;
  grid-template-columns: repeat(var(--ncols, 2), 1fr);
  column-gap: var(--colGap, 24px);
  align-items: end; width: 100%; overflow: hidden;
}
#dm-sheet.is-landscape .dm-one-imgcell {
  min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
}
#dm-sheet.is-landscape .dm-one-namecell {
  min-width: 0; align-self: start; text-align: center;
  font-size: 19px; line-height: 1.3; padding-top: 5px; word-break: break-word; color: #999;
}
/* 橫式1 一格：品名放大至 20px、產品圖往下移一點點（空間不足由自動縮放處理） */
#dm-sheet.bg-h1 .dm-one-namecell { font-size: 20px; line-height: 1.2; }
#dm-sheet.bg-h1 .dm-one-pair { margin-top: 8px; }
/* 橫式一格：壓縮用途/售價區的垂直占用，讓 fitOneGrid 保留較大的產品圖 */
#dm-sheet.is-landscape .dm-one-usage { padding-top: 3px; line-height: 1.4; }
#dm-sheet.is-landscape .dm-one-headprice { padding-top: 4px; }
/* 圖片尺寸（沿用直式比例，乘 --imgScale 供自動縮放） */
#dm-sheet.is-landscape .dm-one-imgcell.is-main .dm-bprod-img { width: calc(170px * var(--imgScale,1)); height: calc(240px * var(--imgScale,1)); }
/* 贈品圖加大（其欄列高由較高的主圖決定，放大不增加垂直成本） */
#dm-sheet.is-landscape .dm-one-imgcell.is-gift .dm-bprod-img { width: calc(140px * var(--imgScale,1)); height: calc(197px * var(--imgScale,1)); }
#dm-sheet.is-landscape .dm-one-pair.has-1-prod .dm-one-imgcell.is-main .dm-bprod-img { width: calc(195px * var(--imgScale,1)); height: calc(275px * var(--imgScale,1)); }
#dm-sheet.is-landscape .dm-one-pair.has-3-prods .dm-one-imgcell.is-main .dm-bprod-img { width: calc(155px * var(--imgScale,1)); height: calc(220px * var(--imgScale,1)); }
#dm-sheet.is-landscape .dm-one-pair.has-3-prods .dm-one-imgcell.is-gift .dm-bprod-img { width: calc(105px * var(--imgScale,1)); height: calc(148px * var(--imgScale,1)); }
#dm-sheet.is-landscape .dm-one-pair.has-3-prods .dm-one-namecell { font-size: 16px; }

/* 橫式 1-grid：標題／促銷標語＋售價同一行；原價換行、右緣切齊售價「元」 */
#dm-sheet.is-landscape .dm-one-pricewrap {
  flex-shrink: 0; width: max-content; max-width: 100%; margin: 0 auto;
}
#dm-sheet.is-landscape .dm-one-headprice {
  display: flex; align-items: baseline; justify-content: center;
  gap: 14px; flex-wrap: nowrap; padding-top: 8px;
}
#dm-sheet.is-landscape .dm-one-headline-i {
  font-size: var(--headlineFS, 24px); font-weight: 500; color: #555; line-height: 1.3;
}
/* 橫式1 一格：標題／促銷標語較其他橫式放大 1px */
#dm-sheet.bg-h1 .dm-one-headline-i { font-size: calc(var(--headlineFS, 24px) + 1px); }
#dm-sheet.is-landscape .dm-one-origline {
  width: 100%; text-align: right; padding-top: 2px;
}

/* 橫式 2-grid：改為左右兩欄（分隔線由上下改為左右） */
#dm-sheet.is-landscape .dm-two-rows { flex-direction: row; }
/* 產品群組於欄位內垂直置中（不撐滿、改置中），兩欄結構相同故仍橫向對齊 */
#dm-sheet.is-landscape .dm-bundle-row { padding: 6px 14px 8px; justify-content: center; }
#dm-sheet.is-landscape .dm-bundle-pair { flex: 0 0 auto; }
#dm-sheet.is-landscape .dm-bundle-row + .dm-bundle-row {
  border-top: none; border-left: 1px solid #dedad6;
}
/* 兩格：標題／促銷標語、售價、原價 各自獨立成行（共三行、置中） */
#dm-sheet.is-landscape .dm-bundle-price-row {
  flex-direction: column; align-items: center; gap: 4px; flex-wrap: nowrap;
}
/* 橫式1：垂線縮短（取消整段 border，改用置中、約 80% 高的短分隔線） */
#dm-sheet.bg-h1 .dm-bundle-row + .dm-bundle-row { border-left: none; position: relative; }
#dm-sheet.bg-h1 .dm-bundle-row + .dm-bundle-row::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 1px; height: 80%; background: #dedad6;
}
/* 橫式1 兩格：標題文字往下移一點 */
#dm-sheet.bg-h1 .is-two-grid .dm-tagline { padding-top: 22px; }

/* 橫式2、3 兩格＝單品特寫：放大圖＋品名＋描述＋售價／原價（左右兩欄）。
   整個產品區塊垂直置中；圖片區與品名/描述皆固定高 → 兩欄區塊等高、置中後仍恆對齊（不一高一低）。 */
#dm-sheet.is-landscape .dm-feature-row {
  flex: 1 1 0; min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 6px; padding: 10px 20px; overflow: hidden;
}
#dm-sheet.is-landscape .dm-feature-img {
  flex-shrink: 0; width: 145px; height: 195px;
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
}
#dm-sheet.is-landscape .dm-feature-img img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
#dm-sheet.is-landscape .dm-feature-name { flex-shrink: 0; font-size: 17px; color: #1a1a1a; font-weight: 400; line-height: 1.3; min-height: 2.6em; }
/* 描述保留約 3 行高 → 兩欄區塊等高，垂直置中後描述/售價仍對齊 */
#dm-sheet.is-landscape .dm-feature-desc { flex-shrink: 0; font-size: 16px; line-height: 1.5; color: #6f6f6f; max-width: 92%; min-height: 5em; }
#dm-sheet.is-landscape .dm-feature-price { flex-shrink: 0; padding-top: 4px; }
#dm-sheet.is-landscape .dm-feature-orig { flex-shrink: 0; }
/* 特寫模式有選贈品時：主圖＋贈品並排（主圖略縮、各自品名在圖下） */
#dm-sheet.is-landscape .dm-feature-imgs {
  flex-shrink: 0; display: flex; align-items: flex-end; justify-content: center; gap: 10px;
}
#dm-sheet.is-landscape .dm-feature-main { display: flex; flex-direction: column; align-items: center; width: 108px; }
#dm-sheet.is-landscape .dm-feature-gift { display: flex; flex-direction: column; align-items: center; width: 70px; }
#dm-sheet.is-landscape .dm-feature-row.has-gift .dm-feature-img { width: 108px; height: 146px; }
#dm-sheet.is-landscape .dm-feature-gift .dm-bprod-img {
  width: 70px; height: 95px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
}
#dm-sheet.is-landscape .dm-feature-main .dm-bprod-name,
#dm-sheet.is-landscape .dm-feature-gift .dm-bprod-name {
  font-size: 16px; color: #8d8d8d; text-align: center; line-height: 1.3; margin-top: 5px;
  max-width: 100%; word-break: break-word;
  min-height: 2.6em;   /* 固定品名高度→圖片區高度固定，兩欄描述/售價恆對齊（不受產品圖高低影響） */
}
/* 左右欄較窄：縮小商品圖與間距，使「主圖＋贈品」能並排不被裁切（以最窄的橫1為準） */
#dm-sheet.is-landscape .dm-bundle-pair { gap: 10px; }
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod.is-main .dm-bprod-img { width: 88px; height: 114px; }
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod.is-gift .dm-bprod-img { width: 58px; height: 75px; }
/* 無贈品（單品）時放大主圖 */
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: 132px; height: 172px; }
/* 將每欄寬度固定為圖片寬，長品名於欄內換行（避免文字撐寬導致主圖＋贈品並排超出） */
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod.is-main { width: 88px; }
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod.is-gift { width: 58px; }
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod.is-main:only-child { width: 132px; }
/* 品名固定 2 行高 → 兩欄品名起始線一致、主圖底部一致（與垂線水平對齊） */
#dm-sheet.is-landscape .dm-bundle-pair .dm-bprod-name {
  font-size: 16px; max-width: 100%; word-break: break-word;
  min-height: 32px;
}

/* ── BG picker ── */
.bg-pick { display: flex; gap: 8px; }
.bg-opt {
  flex: 1; border: 2px solid #e2e2e2; border-radius: 8px;
  padding: 6px 4px; cursor: pointer; text-align: center;
  transition: border-color .15s, background .15s; overflow: hidden;
}
.bg-opt:hover { border-color: #5aaa6a; }
.bg-opt.active { border-color: #3a7d44; background: #f0f7f1; }
.bg-opt img {
  width: 100%; height: 40px; object-fit: cover;
  display: block; border-radius: 3px; margin-bottom: 4px;
}
.bg-label { font-size: 11px; color: #666; }
.bg-opt.active .bg-label { color: #3a7d44; font-weight: 600; }

/* ── Print ── */
@media print {
  @page { size: 210mm 297mm; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  /*
   * Chrome prints at 96dpi → A4 = 793 × 1122 CSS px.
   * Our sheet is designed at 595 × 842 px (screen preview).
   * zoom: 1.334 scales 595 × 1.334 = 793 px  &  842 × 1.334 = 1123 px,
   * filling A4 exactly while preserving every fixed-px proportion.
   */
  html {
    zoom: 1.333; /* 842 × 1.333 = 1122.5 px = A4 height at 96 dpi — exact fit */
    width: 595px !important; height: auto !important;
    overflow: visible !important;
    margin: 0 !important; padding: 0 !important;
    background: none !important;
  }
  body {
    width: 595px !important; height: auto !important;
    overflow: visible !important;
    background: none !important; margin: 0 !important; padding: 0 !important;
  }
  .navbar, .editor-pane { display: none !important; }
  .workspace {
    display: block !important; width: 595px !important;
    height: auto !important; overflow: visible !important;
  }
  .preview-pane {
    position: static !important; display: block !important;
    background: none !important; overflow: visible !important;
    width: 595px !important; height: auto !important;

  }
  .dm-wrap {
    position: static !important; transform: none !important;
    display: block !important;
    margin: 0 !important; padding: 0 !important;
  }
  #dm-sheet {
    width: 595px !important; height: 842px !important;
    box-shadow: none !important; overflow: visible !important;
    display: flex !important;
  }
}
</style>

<script>
/* ══════════════════════════════════════════════
   PRODUCTS
══════════════════════════════════════════════ */
const PRODUCTS = window.PRODUCTS || [];   /* 清單外移至 products.js，由 tools/build-copy.mjs 產生 */

/* ══════════════════════════════════════════════
   STATE
   cells[0..3] used by all layouts:
   four  → cells[0..3]  (2×2 grid)
   two   → cells[0..1]  (2 rows)
   one   → cells[0]     (single)
══════════════════════════════════════════════ */
let layout = 'four';
let bgTemplate = 'portrait'; // 'portrait' | 'h1' | 'h2' | 'h3'

const LAND_BG = {
  h1: '../沙龍DM公版/橫1.jpg',
  h2: '../沙龍DM公版/橫2.jpg',
  h3: '../沙龍DM公版/橫3.jpg',
};

/* 橫式底圖的內容覆蓋區座標（相對於 842×595 的 #dm-sheet）
   數值由實際底圖白色區自動偵測而來；如版面微歪，可在此微調百分比 */
const LAND_POS = {
  h1: { left: '43%', top: '15%', right: '8%', bottom: '15%' },  // 置中右側白框
  h2: { left: '37%', top: '3%',  right: '2%', bottom: '13%' },  // 右側滿版白＋下方footer
  h3: { left: '39%', top: '3%',  right: '3%', bottom: '14%' },  // 白區自 36% 起：左右各留約 3%，內容於白框內置中

/* 括號：中文用全形（），英/波用半形() */
function paren(s) { return lang === 'zh' ? `（${s}）` : `(${s})`; }
/* 售價「數字＋幣別」內層 HTML（不換算；值為當前語言的售價字串，空白則不顯示）。
   幣別符號位置依語言；可指定 num/unit 的 class。 */
function priceInnerCls(val, numCls, unitCls) {
  const s = (val == null ? '' : String(val)).trim();
  if (!s) return '';
  const n = fmt(s);
  if (lang === 'en') return `<span class="${unitCls}">$</span><span class="${numCls}">${n}</span>`;
  if (lang === 'pl') return `<span class="${numCls}">${n}</span><span class="${unitCls}">&nbsp;zł</span>`;
  return `<span class="${numCls}">${n}</span><span class="${unitCls}">元</span>`;
}
const priceInner = (val) => priceInnerCls(val, 'dm-price-num', 'dm-price-unit');
/* 原價文字（不含外框括號；值空白或 0 則回空） */
function origText(val) {
  const s = (val == null ? '' : String(val)).trim();
  if (!s || s === '0') return '';
  const n = fmt(s);
  if (lang === 'en') return `Orig. $${n}`;
  if (lang === 'pl') return `dawniej ${n} zł`;
  return `原價NT$${n}`;
}
/* 產品名稱（依語言）：
   en → 優先用國際部官方英文品名（names-en.js，含容量）；查無再退回 i18n 翻譯。
   pl → i18n 翻譯基底名 + 容量後綴。查不到一律回中文。 */
function prodName(id) {
  const p = getProd(id);
  if (lang === 'zh') return p.name;
  if (lang === 'en') {
    const official = (window.PRODUCT_NAMES_EN || {})[p.id];
    if (official) return official;
  }
  const t = (window.PRODUCT_I18N || {})[p.copyKey];
  const base = t && t['name_' + lang];
  if (!base) return p.name;
  const suffix = p.name.indexOf(p.copyKey) === 0 ? p.name.slice(p.copyKey.length).trim() : '';
  return suffix ? `${base} ${suffix}` : base;
}

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const getProd = id => PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
const getProdOrNull = id => id ? (PRODUCTS.find(p => p.id === id) || null) : null;

/* 取得某商品的文案（介紹／用途），以 copyKey 對應；依 lang 回傳對應語言（查不到該語言則回中文） */
function getCopy(prodId) {
  const p = getProdOrNull(prodId);
  if (!p || !p.copyKey) return null;
  const zh = (window.PRODUCT_COPY || {})[p.copyKey];
  if (!zh) return null;
  if (lang === 'zh') return zh;
  const t = (window.PRODUCT_I18N || {})[p.copyKey];
  const pick = f => (t && t[f + '_' + lang] !== undefined) ? t[f + '_' + lang] : zh[f];
  return { intro: pick('intro'), usage: pick('usage'), orig: zh.orig, series: zh.series };
}

/* 該商品（依其容量）的建議售價；無則 0 */
const getOrigNum = id => { const p = getProdOrNull(id); return p && p.orig ? Number(p.orig) : 0; };

/* 標題／促銷標語：收斂換行為空白（避免禮盒等多行介紹塞進標題時爆版） */
const cleanHeadline = s => (s || '').replace(/\r?\n+/g, ' ').replace(/[ 　]{2,}/g, ' ').trim();

/* 原價＝所選產品（主商品＋贈品/輔助商品）建議售價「加總」。
   定價預設＝原價；若無原價（加總為 0）則定價寫 5000、原價留空（不顯示）。 */
function applyPricing(cell, prodIds) {
  const sum = prodIds.filter(Boolean).reduce((s, id) => s + getOrigNum(id), 0);
  cell.origPrice = sum > 0 ? String(sum) : '';
  cell.price     = sum > 0 ? String(sum) : '5000';
}

/* 依「主商品」帶入文字：標題←介紹、用途←用途；沒寫的留空（不亂填）。
   介紹／用途一律取主商品，價格依所選產品加總。 */
function applyMainCopy(cell) {
  const cp = getCopy(cell.prodId);
  cell.headline = cp ? cp.intro : '';
  cell.usage    = cp ? cp.usage : '';
  applyPricing(cell, [cell.prodId, cell.giftId]);
}

function fmt(v) {
  const n = v ? v.toString().replace(/,/g, '') : '';
  if (!n || isNaN(Number(n)) || n === '0') return n || '0';
  return Number(n).toLocaleString('zh-TW');
}

function enc(path) {
  return path.split('/').map((s, i) => i === 0 ? s : encodeURIComponent(s)).join('/');
}

function bundleRowHTML(c) {
  const mp = getProd(c.prodId);

  /* 品名為長字串時，窄欄（尤其橫式1）會把品名疊成高塔、左右不對稱。

  const latin = lang !== 'zh';
  const giftSep = lang === 'zh' ? '' : ' ';   // 中文全形括號後不加空格
  const namesBlock = gp2 => `
      <div class="dm-bundle-names">${prodName(mp.id)}${gp2 ? `<br><span class="dm-gift-line">${paren(c.giftLabel)}${giftSep}${prodName(gp2.id)}</span>` : ''}</div>`;

  // 橫式2、3：單品特寫（放大圖＋品名＋描述＋售價／原價）。預設不放贈品，但若有選贈品仍顯示
  if (isFeatureTwo()) {
    const gp = getProdOrNull(c.giftId);
    const desc = (c.usage || '').trim();
    const origF = origText(dispOrig(c))
      ? `<div class="dm-feature-orig"><span class="dm-orig-price">${paren(origText(dispOrig(c)))}</span></div>` : '';
    const giftCol = gp ? `
        <div class="dm-bprod is-gift dm-feature-gift">
          <div class="dm-gift-badge">${c.giftLabel}</div>
          <div class="dm-bprod-img"><img src="${enc(gp.img)}" alt="${prodName(gp.id)}" onerror="this.style.opacity=0.1"></div>
        </div>` : '';
    return `
      <div class="dm-bundle-row dm-feature-row${gp ? ' has-gift' : ''}">
        <div class="dm-feature-imgs">
          <div class="dm-bprod is-main dm-feature-main">
            <div class="dm-feature-img">
              <img src="${enc(mp.img)}" alt="${prodName(mp.id)}" onerror="this.style.opacity=0.1">
            </div>
          </div>
          ${giftCol}
        </div>
        ${gp ? namesBlock(gp) : `<div class="dm-feature-name">${prodName(mp.id)}</div>`}
        ${desc ? `<div class="dm-feature-desc">${desc}</div>` : ''}
        <div class="dm-feature-price">
          <span class="dm-price-grp">${priceInner(dispPrice(c))}</span>
        </div>
        ${origF}
      </div>`;
  }

  const gp = getProdOrNull(c.giftId);

  const giftCol = gp ? `
    <div class="dm-bprod is-gift">
      <div class="dm-gift-badge">${c.giftLabel}</div>
      <div class="dm-bprod-img">
        <img src="${enc(gp.img)}" alt="${prodName(gp.id)}" onerror="this.style.opacity=0.1">
      </div>
    </div>` : '';

  const orig = origText(dispOrig(c))
    ? `<span class="dm-orig-price">${paren(origText(dispOrig(c)))}</span>` : '';

  const hl = c.headline
    ? `<span class="dm-headline-lbl">${cleanHeadline(c.headline)}</span>` : '';

  /* 用途說明（產品描述）：直式兩格也顯示（自動帶入主商品用途，可修改／清空） */
  const desc2 = (c.usage || '').trim();

  return `
    <div class="dm-bundle-row">
      <div class="dm-bundle-pair">
        <div class="dm-bprod is-main">
          <div class="dm-bprod-img">
            <img src="${enc(mp.img)}" alt="${prodName(mp.id)}" onerror="this.style.opacity=0.1">
          </div>
        </div>
        ${giftCol}
      </div>
      ${namesBlock(gp)}
      ${desc2 ? `<div class="dm-bundle-desc">${desc2}</div>` : ''}
      <div class="dm-bundle-price-row">
        ${hl}
        <span class="dm-price-grp">${priceInner(dispPrice(c))}</span>
        ${orig}
      </div>
    </div>`;
}

function renderTwo(tag) {
  return `
    <div class="dm-content is-two-grid">
      <div class="dm-tagline">${tag}</div>
      <div class="dm-two-rows">
        ${bundleRowHTML(state.two[0])}
        ${bundleRowHTML(state.two[1])}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   DM RENDER — ONE  (single centred)
══════════════════════════════════════════════ */
function renderOne(tag, subtitle) {
  const c = state.one[0];
  
  // Render each product dynamically based on its role
  const prodsHtml = c.products.map(p => {
    const prod = getProd(p.prodId);
    if (p.role === 'main') {
      return `
        <div class="dm-bprod is-main">
          <div class="dm-bprod-img">
            <img src="${enc(prod.img)}" alt="${prodName(prod.id)}" onerror="this.style.opacity=0.1">
          </div>
          <div class="dm-bprod-name">${prodName(prod.id)}</div>
        </div>
      `;
    } else {
      return `
        <div class="dm-bprod is-gift">
          <div class="dm-gift-badge">${p.giftLabel || GIFT_DEFAULTS[lang]}</div>
          <div class="dm-bprod-img">
            <img src="${enc(prod.img)}" alt="${prodName(prod.id)}" onerror="this.style.opacity=0.1">
          </div>
          <div class="dm-bprod-name">${prodName(prod.id)}</div>
        </div>
      `;
    }
  }).join('');

  // 橫式：圖片與品名分兩列（grid），使圖片底部恆對齊、且品名只有一行時不留空行
  const imgCells = c.products.map(p => {
    const prod = getProd(p.prodId);
    const badge = p.role !== 'main' ? `<div class="dm-gift-badge">${p.giftLabel || GIFT_DEFAULTS[lang]}</div>` : '';
    return `<div class="dm-one-imgcell ${p.role === 'main' ? 'is-main' : 'is-gift'}">${badge}<div class="dm-bprod-img"><img src="${enc(prod.img)}" alt="${prodName(prod.id)}" onerror="this.style.opacity=0.1"></div></div>`;
  }).join('');
  const nameCells = c.products.map(p => `<div class="dm-one-namecell">${prodName(p.prodId)}</div>`).join('');

  const orig = origText(dispOrig(c))
    ? `<span class="dm-orig-price">${paren(origText(dispOrig(c)))}</span>` : '';

  const hlBlock = c.headline
    ? `<div class="dm-one-headline">${cleanHeadline(c.headline)}</div>` : '';

  const has3Prods = c.products.length >= 3;
  const pairClass = has3Prods ? 'dm-one-pair has-3-prods'
                  : c.products.length === 1 ? 'dm-one-pair has-1-prod'
                  : 'dm-one-pair';
  const colGap = has3Prods ? 16 : 28;

  // 用途：每個商品一欄，與上方商品對齊；每個產品都顯示自己的用途（不去重，即使相同也各自顯示）
  let anyUsage = false;
  const usageCols = c.products.map(p => {
    const u = (p.usage || '').trim();
    if (!u) return `<div class="dm-one-usage-col"></div>`;
    anyUsage = true;
    return `<div class="dm-one-usage-col"><span class="dm-one-usage-text">${u}</span></div>`;
  }).join('');
  const usageHtml = anyUsage ? `<div class="dm-one-usage">${usageCols}</div>` : '';

  const priceMain =
    `<span class="dm-one-price-main">${priceInner(dispPrice(c))}</span>`;

  /* 橫式：標題／促銷標語＋售價同一行，原價換行且右緣切齊上行的「元」；
     直式維持原本（標題獨立行、售價列）。pricewrap 寬度＝標題+售價的內容寬，
     原價於此寬度內靠右 → 右緣對齊售價「元」。 */
  const priceBlock = isLandscape() ? `
        <div class="dm-one-pricewrap">
          <div class="dm-one-headprice">
            ${c.headline ? `<span class="dm-one-headline-i">${cleanHeadline(c.headline)}</span>` : ''}
            ${priceMain}
          </div>
          ${orig ? `<div class="dm-one-origline">${orig}</div>` : ''}
        </div>
  ` : `
        ${hlBlock}
        <div class="dm-one-price-row">
          ${priceMain}
          ${orig}
        </div>
  `;

  const pairInner = isLandscape()
    ? `<div class="${pairClass}" style="--ncols:${c.products.length}">${imgCells}${nameCells}</div>`
    : `<div class="${pairClass}">${prodsHtml}</div>`;

  return `
    <div class="dm-content is-one-grid">
      <div class="dm-tagline">${tag}</div>
      ${subtitle ? `<div class="dm-subtitle">${subtitle}</div>` : ''}
      <div class="dm-one-block" style="--colGap:${colGap}px">
        ${pairInner}
        ${usageHtml}
        ${priceBlock}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   自動存檔／還原（localStorage）
   每次 renderDM 後保存；開啟頁面時還原（商品若已下架則回退預設）。
══════════════════════════════════════════════ */
const STORE_KEY = 'dm-editor-state-v1';

function saveState() {
  try {
    taglines[layout] = document.getElementById('dm-tagline')?.value ?? taglines[layout];
    subtitles[layout] = document.getElementById('dm-subtitle')?.value ?? subtitles[layout];
    localStorage.setItem(STORE_KEY, JSON.stringify({ v: 1, layout, bgTemplate, lang, state, taglines, subtitles }));
  } catch (e) { /* 隱私模式等情況忽略 */ }
}

function loadState() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem(STORE_KEY) || 'null'); } catch (e) {}
  if (!d || d.v !== 1 || !d.state) return false;
  const validId = id => PRODUCTS.some(p => p.id === id);
  const fixCell = c => ({ ...mkCell(''), ...c,
    prodId: validId(c.prodId) ? c.prodId : ((PRODUCTS[0] && PRODUCTS[0].id) || ''),
    giftId: (c.giftId && validId(c.giftId)) ? c.giftId : '' });
  if (Array.isArray(d.state.four) && d.state.four.length === 4) state.four = d.state.four.map(fixCell);
  if (Array.isArray(d.state.two) && d.state.two.length === 2) state.two = d.state.two.map(fixCell);
  const one = d.state.one && d.state.one[0];
  if (one && Array.isArray(one.products)) {
    one.products = one.products.filter(p => p && validId(p.prodId)).slice(0, 3);
    if (one.products.length) state.one = [{ headline: '', usage: '', price: '', origPrice: '', ...one }];
  }
  if (['four', 'two', 'one'].includes(d.layout)) layout = d.layout;
  if (['portrait', 'h1', 'h2', 'h3'].includes(d.bgTemplate)) bgTemplate = d.bgTemplate;
  if (bgTemplate === 'h1' && layout === 'four') layout = 'two';   // 橫式1 不支援四格
  if (['zh', 'en', 'pl'].includes(d.lang)) lang = d.lang;
  if (d.taglines) Object.assign(taglines, d.taglines);
  if (d.subtitles) Object.assign(subtitles, d.subtitles);
  return true;
}

function resetAll() {
  if (!confirm(t('resetConfirm'))) return;
  try { localStorage.removeItem(STORE_KEY); } catch (e) {}
  location.reload();
}

/* ══════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════ */
const HDR = '../沙龍DM公版/公版DM_1.jpg';
const FTR = '../沙龍DM公版/公版DM_2.jpg';

function renderDM() {
  const tag = document.getElementById('dm-tagline')?.value || '';
  const subtitle = document.getElementById('dm-subtitle')?.value || '';
  const body = layout === 'four' ? renderFour(tag)
             : layout === 'two'  ? renderTwo(tag)
             : renderOne(tag, subtitle);
  const sheet = document.getElementById('dm-sheet');

  /* 外文（EN/PL）加 lang-latin：品名改整行排版、禁止單字中斷等視覺調整 */
  const latinCls = lang === 'zh' ? '' : ' lang-latin';
  if (isLandscape()) {
    sheet.className = ('is-landscape bg-' + bgTemplate + latinCls);
    const p = LAND_POS[bgTemplate];
    /* inline style 讓 html2canvas proxy 複製 innerHTML 後仍保有正確定位 */
    const posStyle =
      `position:absolute;z-index:1;display:flex;flex-direction:column;overflow:hidden;` +
      `left:${p.left};top:${p.top};right:${p.right};bottom:${p.bottom}`;
    sheet.innerHTML =
      `<img class="dm-bg-full" src="${enc(LAND_BG[bgTemplate])}" alt="">` +
      `<div class="dm-land-content" style="${posStyle}">${body}</div>`;
  } else {
    sheet.className = latinCls.trim();
    sheet.innerHTML =
      `<div class="dm-hdr"><img src="${enc(HDR)}" alt="header"></div>` +
      body +
      `<div class="dm-ftr"><img src="${enc(FTR)}" alt="footer"></div>`;
  }

  fitDM();
  if (!isLandscape()) {
    // 直式：頁首/頁尾圖載入後內容高度才確定，載完後重新渲染校正（圖已快取，不會重複觸發）
    sheet.querySelectorAll('.dm-hdr img, .dm-ftr img').forEach(img => {
      if (!img.complete) img.addEventListener('load', () => renderDM(), { once: true });
    });
  }
  saveState();   // 任何變更渲染後自動存檔
}

/* ══════════════════════════════════════════════
   AUTO-FIT（防破版）：渲染後依實際溢出逐步縮小。
   原則：先縮次要文字、再縮商品圖、最後縮價格，內容完整保留不刪減。
   inline style 每次 renderDM 重建 innerHTML 時歸零，故縮放不累積。
══════════════════════════════════════════════ */

/* 元素溢出量：以子孫節點的實際外框（rect）比對容器外框。
   不能用 scrollHeight（flex-end/center 的上緣溢出不計入），也不能攤平 flex 對齊來量
   （column flex 改 align-items 會改變子元素寬度→換行改變→假性溢出）。 */
function overOf(el) {
  if (!el) return 0;
  const r = el.getBoundingClientRect();
  let over = 0;
  el.querySelectorAll('*').forEach(d => {
    const dr = d.getBoundingClientRect();
    if (!dr.width && !dr.height) return;   // 忽略隱藏元素
    over = Math.max(over, dr.bottom - r.bottom, r.top - dr.top, dr.right - r.right, r.left - dr.left);
  });
  return over;
}

/* 字級縮小一步：各元素 -step px，低於「初始字級×minRatio」者不再縮；全到下限回 false */
function fontStep(els, minRatio, step = 0.5) {
  const bases = els.map(el => parseFloat(getComputedStyle(el).fontSize));
  return () => {
    let changed = false;
    els.forEach((el, i) => {
      const cur = parseFloat(el.style.fontSize) || bases[i];
      if (cur - step >= bases[i] * minRatio) { el.style.fontSize = (cur - step) + 'px'; changed = true; }
    });
    return changed;
  };
}

/* 尺寸縮小一步：高度每步約 -4%（等比縮寬，keepWidth=true 只縮高），低於初始×minRatio 不再縮 */
function sizeStep(els, minRatio, keepWidth = false) {
  const bases = els.map(el => ({ w: el.offsetWidth, h: el.offsetHeight }));
  return () => {
    let changed = false;
    els.forEach((el, i) => {
      const cur = parseFloat(el.style.height) || bases[i].h;
      const next = cur - Math.max(2, bases[i].h * 0.04);
      if (next >= bases[i].h * minRatio) {
        el.style.height = next.toFixed(1) + 'px';
        if (!keepWidth) el.style.width = (bases[i].w * next / bases[i].h).toFixed(1) + 'px';
        changed = true;
      }
    });
    return changed;
  };
}

/* 贈品標籤縮小一步：高度與下邊距各 -2px（高度下限 14px、邊距下限 2px） */
function badgeStep(els) {
  const bases = els.map(el => ({ h: el.offsetHeight, mb: parseFloat(getComputedStyle(el).marginBottom) || 0 }));
  return () => {
    let changed = false;
    els.forEach((el, i) => {
      const h = parseFloat(el.style.height) || bases[i].h;
      const mb = el.style.marginBottom !== '' ? parseFloat(el.style.marginBottom) : bases[i].mb;
      if (h - 2 >= 14) { el.style.height = (h - 2) + 'px'; changed = true; }
      if (mb - 2 >= 2) { el.style.marginBottom = (mb - 2) + 'px'; changed = true; }
    });
    return changed;
  };
}

/* 內距縮小一步：上下 padding 各 -1px（下限 2px） */
function padStep(els) {
  const bases = els.map(el => {
    const cs = getComputedStyle(el);
    return { t: parseFloat(cs.paddingTop) || 0, b: parseFloat(cs.paddingBottom) || 0 };
  });
  return () => {
    let changed = false;
    els.forEach((el, i) => {
      const t = el.style.paddingTop !== '' ? parseFloat(el.style.paddingTop) : bases[i].t;
      const b = el.style.paddingBottom !== '' ? parseFloat(el.style.paddingBottom) : bases[i].b;
      if (t - 1 >= 2) { el.style.paddingTop = (t - 1) + 'px'; changed = true; }
      if (b - 1 >= 2) { el.style.paddingBottom = (b - 1) + 'px'; changed = true; }
    });
    return changed;
  };
}

/* 依序執行縮小階段：前一階段到下限仍溢出才進入下一階段 */
function shrinkStages(measure, stages) {
  for (const stage of stages) {
    let guard = 0;
    while (measure() > 1 && guard++ < 60) { if (!stage()) break; }
    if (measure() <= 1) return;
  }
}

/* 標題／副標：超過 maxLines 行時逐步縮字級（至初始的 55%），維持 1~2 行較美觀 */
function fitHeadingLine(sel, maxLines) {
  const el = document.querySelector('#dm-sheet ' + sel);
  if (!el || !el.textContent.trim()) return;
  const cs = () => getComputedStyle(el);
  const contentH = () => el.clientHeight - parseFloat(cs().paddingTop) - parseFloat(cs().paddingBottom);
  const lineH = () => {
    const lh = parseFloat(cs().lineHeight);
    return isNaN(lh) ? parseFloat(cs().fontSize) * 1.3 : lh;
  };
  const base = parseFloat(cs().fontSize);
  let fs = base, guard = 0;
  while (contentH() > lineH() * (maxLines + 0.4) && fs > base * 0.55 && guard++ < 40) {
    fs -= 1; el.style.fontSize = fs + 'px';
  }
}

/* 四格：逐格縮放（headline/品名 → 圖高 → 價格） */
function fitFourGrid() {
  document.querySelectorAll('#dm-sheet .dm-cell').forEach(cell => {
    const text = cell.querySelector('.dm-cell-text');
    const measure = () => Math.max(overOf(cell), overOf(text));
    const q = s => [...cell.querySelectorAll(s)];
    shrinkStages(measure, [
      fontStep(q('.dm-cell-names'), 0.62),                                  // 1) 先縮品名（長品名是占高主因，優先保住標語）
      sizeStep(q('.dm-cell-imgs'), 0.5, true),                              // 2) 縮圖高
      fontStep([...q('.dm-cell-headline'), ...q('.dm-cell-names')], 0.6),    // 3) 標語＋品名一起
      fontStep([...q('.dm-cell-price'), ...q('.dm-cell-unit'), ...q('.dm-cell-orig')], 0.7),
      fontStep([...q('.dm-cell-headline'), ...q('.dm-cell-names'),           // 4) 最後保險：全格文字再縮
               ...q('.dm-cell-price'), ...q('.dm-cell-unit'), ...q('.dm-cell-orig')], 0.5),
    ]);
  });
}

/* 兩格：一般（直式／橫式1）與單品特寫（橫式2/3）各自縮放 */
function fitTwoGrid() {
  document.querySelectorAll('#dm-sheet .dm-bundle-row:not(.dm-feature-row)').forEach(row => {
    const pair = row.querySelector('.dm-bundle-pair');
    const measure = () => Math.max(overOf(row), overOf(pair));
    const q = s => [...row.querySelectorAll(s)];
    shrinkStages(measure, [
      sizeStep(q('.dm-bprod-img'), 0.55),  // 1) 先縮商品圖：文字可讀性優先
      badgeStep(q('.dm-gift-badge')),      // 2) 縮贈品標籤高度與下邊距
      padStep([row]),                      // 3) 縮列上下內距
      fontStep(q('.dm-bundle-desc'), 0.8), // 4) 之後才開始縮文字
      fontStep([...q('.dm-bprod-name'), ...q('.dm-bundle-names'), ...q('.dm-headline-lbl')], 0.75),
      sizeStep(q('.dm-bprod-img'), 0.32),  // 5) 極端長描述：商品圖再讓位
      fontStep([...q('.dm-price-num'), ...q('.dm-price-unit'), ...q('.dm-orig-price')], 0.7),
      fontStep([...q('.dm-bprod-name'), ...q('.dm-bundle-names'), ...q('.dm-headline-lbl'), ...q('.dm-gift-badge'), ...q('.dm-bundle-desc')], 0.55), // 最後保險
    ]);
  });
  document.querySelectorAll('#dm-sheet .dm-feature-row').forEach(row => {
    const measure = () => overOf(row);
    const q = s => [...row.querySelectorAll(s)];
    shrinkStages(measure, [
      fontStep(q('.dm-feature-desc'), 0.7),
      fontStep([...q('.dm-feature-name'), ...q('.dm-bprod-name'), ...q('.dm-bundle-names')], 0.75),
      sizeStep([...q('.dm-feature-img'), ...q('.dm-feature-gift .dm-bprod-img')], 0.55),
      fontStep([...q('.dm-price-num'), ...q('.dm-price-unit'), ...q('.dm-orig-price')], 0.7),
    ]);
  });
}

/* 渲染後統一入口：先收斂主/副標行數，再依版面縮放 */
function fitDM() {
  fitHeadingLine('.dm-tagline', 2);
  fitHeadingLine('.dm-subtitle', 2);
  if (layout === 'one') fitOneGrid();
  else if (layout === 'two') fitTwoGrid();
  else fitFourGrid();
}

/* ── 一格自動縮放：用途文字 3 行以上時，先縮字級（10→8pt），仍超出再等比縮小商品圖，
      確保內容不爆版、且文字不刪減 ── */
function fitOneGrid() {
  const block = document.querySelector('#dm-sheet .dm-one-block');
  if (!block) return;
  const overflow = () => overOf(block);
  // 用途字級起始：各版統一 12pt；下限 橫式1 7pt／其餘橫式 8pt／直式 8.5pt
  //（文字可讀性優先，空間不足時先縮商品圖；下限維持以防長文字破版）
  const isH1 = bgTemplate === 'h1';
  const usageFloor = isH1 ? 7 : (isLandscape() ? 8 : 8.5);
  let fs = 12, hf = 24, scale = 1, guard = 0;
  block.style.setProperty('--usageFS', fs + 'pt');
  block.style.setProperty('--headlineFS', hf + 'px');
  block.style.setProperty('--imgScale', scale);
  while (overflow() > 1 && fs > usageFloor && guard++ < 20) {  // 1) 縮用途字級
    fs -= 0.5; block.style.setProperty('--usageFS', fs + 'pt');
  }
  guard = 0;
  while (overflow() > 1 && hf > 13 && guard++ < 30) {       // 2) 縮標題字級到 13px（長介紹/禮盒）
    hf -= 1; block.style.setProperty('--headlineFS', hf + 'px');
  }
  guard = 0;
  const nameStep = fontStep([...block.querySelectorAll('.dm-bprod-name, .dm-one-namecell')], 0.8);
  while (overflow() > 1 && guard++ < 30) {                  // 2.5) 縮品名（比縮圖更不傷視覺）
    if (!nameStep()) break;
  }
  guard = 0;
  const minScale = isLandscape() ? 0.3 : 0.45;   // 橫式（尤其橫1白框較小）允許縮更多以免裁切
  while (overflow() > 1 && scale > minScale && guard++ < 40) {   // 3) 仍超出→縮商品圖
    scale -= 0.05; block.style.setProperty('--imgScale', scale.toFixed(2));
  }
  guard = 0;
  const lastStep = fontStep([...block.querySelectorAll(       // 4) 最後保險：全區文字再縮
    '.dm-one-usage, .dm-bprod-name, .dm-one-namecell, .dm-gift-badge, ' +
    '.dm-price-num, .dm-price-unit, .dm-orig-price, .dm-one-headline, .dm-one-headline-i')], 0.7);
  while (overflow() > 1 && guard++ < 40) {
    if (!lastStep()) break;
  }
}

/* ══════════════════════════════════════════════
   EDITOR BLOCKS
══════════════════════════════════════════════ */
function opts(selectedId) {
  /* 下拉選單顯示依當前語言（en 用國際部官方品名） */
  return PRODUCTS.map(p =>
    `<option value="${p.id}" ${p.id === selectedId ? 'selected' : ''}>【${p.series}】 ${prodName(p.id)}</option>`
  ).join('');
}

function cellEditor(idx, title) {
  if (layout === 'one') {
    const c = state.one[0];
    const prodsHtml = c.products.map((p, i) => oneGridProductEditor(p, i)).join('');
    
    const addProdBtn = c.products.length < 3 ? `
      <button type="button" style="width: 100%; background: #3a7d44; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background 0.15s;"
        onclick="addOneProd()"
        onmouseover="this.style.background='#2d6235'" 
        onmouseout="this.style.background='#3a7d44'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ${t('addProduct')}
      </button>
    ` : '';

    return `
      <div class="block-ed">
        <div class="block-ed-title">${title}</div>

        <div style="margin-bottom: 12px;">
          <span class="field-lbl" style="font-weight: 700; margin-bottom: 8px; display: block;">${t('prodList')}</span>
          ${prodsHtml}
          ${addProdBtn}
        </div>

        <div class="headline-field">
          <label class="field-lbl">${t('headlineField')}</label>
          <input type="text" class="field-input" style="padding:5px 8px"
            value="${c.headline}" placeholder="${t('headlinePh')}"
            oninput="onField(${idx},'headline',this.value)">
        </div>
        <div class="price-pair">
          <div class="price-slot">
            <label>${t('priceLabel')}${paren(CUR_UNIT[lang])}</label>
            <input type="text" class="price-input" value="${dispPrice(c)}"
              oninput="onField(${idx},'price',this.value)">
          </div>
          <div class="price-slot">
            <label>${t('origLabel')}${paren(CUR_UNIT[lang])}</label>
            <input type="text" class="price-input" value="${dispOrig(c)}"
              oninput="onField(${idx},'origPrice',this.value)">
          </div>
        </div>
      </div>
    `;
  }

  const c = state[layout][idx], mp = getProd(c.prodId);
  const gp = c.giftId ? getProd(c.giftId) : PRODUCTS[0];
  return `
    <div class="block-ed">
      <div class="block-ed-title">${title}</div>
      <div class="prod-pair">
        <div class="prod-slot">
          <div class="prod-slot-lbl">${t('mainProduct')}</div>
          <div class="prod-thumb-row">
            <img class="prod-thumb" id="th${idx}m" src="${enc(mp.img)}" alt="">
          </div>
          <select class="prod-sel" onchange="onProd(${idx},'prodId',this.value)">
            ${opts(c.prodId)}
          </select>
        </div>
        <div class="prod-slot">
          <div class="prod-slot-lbl">${t('giftProduct')}</div>
          <div class="prod-thumb-row">
            <img class="prod-thumb" id="th${idx}g" src="${enc(gp.img)}" alt="">
          </div>
          <select class="prod-sel" onchange="onProd(${idx},'giftId',this.value)">
            <option value="">${t('giftNone')}</option>
            ${opts(c.giftId)}
          </select>
        </div>
      </div>
      <div class="gift-label-field" id="gl-field-${idx}" style="${c.giftId ? '' : 'display:none'}">
        <label class="field-lbl">${t('giftLabelField')}</label>
        <input type="text" class="field-input" style="padding:5px 8px"
          value="${c.giftLabel}" placeholder="${t('giftPh')}"
          oninput="onField(${idx},'giftLabel',this.value)">
      </div>
      <div class="headline-field">
        <label class="field-lbl">${t('headlineField')}</label>
        <input type="text" class="field-input" style="padding:5px 8px"
          value="${c.headline}" placeholder="${t('headlinePh')}"
          oninput="onField(${idx},'headline',this.value)">
      </div>
      ${layout === 'two' ? `
      <div style="margin-bottom:7px">
        <label class="field-lbl">${t('descField')}</label>
        <textarea class="field-input" style="padding:5px 8px; resize:vertical; min-height:42px; line-height:1.5"
          placeholder="${t('descPh')}"
          oninput="onField(${idx},'usage',this.value)">${c.usage || ''}</textarea>
      </div>` : ''}
      <div class="price-pair">
        <div class="price-slot">
          <label>${t('priceLabel')}${paren(CUR_UNIT[lang])}</label>
          <input type="text" class="price-input" value="${dispPrice(c)}"
            oninput="onField(${idx},'price',this.value)">
        </div>
        <div class="price-slot">
          <label>${t('origLabel')}${paren(CUR_UNIT[lang])}</label>
          <input type="text" class="price-input" value="${dispOrig(c)}"
            oninput="onField(${idx},'origPrice',this.value)">
        </div>
      </div>
    </div>`;
}

function buildEditorBlocks() {
  let html = '';
  if (layout === 'four') {
    html = cellEditor(0,t('cellA')) + cellEditor(1,t('cellB')) +
           cellEditor(2,t('cellC')) + cellEditor(3,t('cellD'));
  } else if (layout === 'two') {
    html = cellEditor(0,t('blockTop')) + cellEditor(1,t('blockBottom'));
  } else {
    html = cellEditor(0,t('blockOne'));
  }
  document.getElementById('block-editors').innerHTML = html;
}

/* ══════════════════════════════════════════════
   EVENT HANDLERS
══════════════════════════════════════════════ */
function onProd(idx, field, val) {
  const cell = state[layout][idx];
  cell[field] = val;

  // 換「主商品」→ 帶入標題/用途，並依加總重算原價與定價
  if (field === 'prodId') {
    applyMainCopy(cell);
  } else if (field === 'giftId') {
    // 換「贈品」→ 標題/用途維持主商品，但原價(加總)與定價需重算
    applyPricing(cell, [cell.prodId, cell.giftId]);
  }
  buildEditorBlocks();
  renderDM();
}

function onField(idx, field, val) {
  const obj = state[layout][idx];
  if (field === 'price' || field === 'origPrice') {
    setDispPrice(obj, field, val);   // 中文寫入 TWD；外文寫入該語言的手動價格
  } else {
    obj[field] = val;
  }
  renderDM();
}

function oneGridProductEditor(p, prodIdx) {
  const prod = getProd(p.prodId);
  const isMain = p.role === 'main';
  const isSub = p.role === 'sub';
  
  // Role selector (Main/Sub)
  const roleSelect = `
    <div style="margin-bottom: 6px;">
      <span class="field-lbl">${t('prodType')}</span>
      <div style="display: flex; gap: 12px; margin-top: 4px;">
        <label style="font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="radio" name="one-role-${prodIdx}" value="main" ${isMain ? 'checked' : ''} onchange="onOneProdRole(${prodIdx}, 'main')">
          ${t('roleMain')}
        </label>
        <label style="font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="radio" name="one-role-${prodIdx}" value="sub" ${isSub ? 'checked' : ''} onchange="onOneProdRole(${prodIdx}, 'sub')">
          ${t('roleSub')}
        </label>
      </div>
    </div>
  `;

  // Gift label input (only shown if Sub)
  const giftLabelInput = isSub ? `
    <div style="margin-top: 6px;">
      <label class="field-lbl">${t('giftLabelField2')}</label>
      <input type="text" class="field-input" style="padding: 5px 8px;"
        value="${p.giftLabel || GIFT_DEFAULTS[lang]}" placeholder="${t('giftPh')}"
        oninput="onOneProdField(${prodIdx}, 'giftLabel', this.value)">
    </div>
  ` : '';

  // Usage field (每個商品各自的用途，自動帶入、可修改)
  const usageInput = `
    <div style="margin-top: 6px;">
      <label class="field-lbl">${t('usageField')}</label>
      <textarea class="field-input" style="padding: 5px 8px; resize: vertical; min-height: 44px; line-height: 1.5;"
        placeholder="${t('usagePh')}"
        oninput="onOneProdField(${prodIdx}, 'usage', this.value)">${p.usage || ''}</textarea>
    </div>
  `;

  // Delete button (for any product other than the first one)
  const deleteBtn = prodIdx > 0 ? `
    <button type="button" style="background: #e53e3e; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 8px; transition: background 0.15s;" 
      onclick="deleteOneProd(${prodIdx})"
      onmouseover="this.style.background='#c53030'" 
      onmouseout="this.style.background='#e53e3e'">
      ${t('deleteProduct')}
    </button>
  ` : '';

  return `
    <div style="background: #fdfdfd; border: 1px solid #e2e2e2; border-radius: 6px; padding: 10px; margin-bottom: 10px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
        <span style="font-size: 11px; font-weight: 700; color: #555;">${t('product')} ${prodIdx + 1}</span>
      </div>
      <div style="display: flex; gap: 6px; margin-bottom: 6px; align-items: center;">
        <img class="prod-thumb" id="th-one-${prodIdx}" src="${enc(prod.img)}" alt="" style="width: 32px; height: 32px; object-fit: contain; border: 1px solid #e5e5e5; border-radius: 4px; background: #f5f5f5; flex-shrink: 0;">
        <select class="prod-sel" style="flex: 1;" onchange="onOneProdId(${prodIdx}, this.value)">
          ${opts(p.prodId)}
        </select>
      </div>
      ${roleSelect}
      ${giftLabelInput}
      ${usageInput}
      ${deleteBtn}
    </div>
  `;
}

function addOneProd() {
  if (state.one[0].products.length < 3) {
    const np = { prodId: (PRODUCTS[0] && PRODUCTS[0].id) || '', role: 'sub', giftLabel: GIFT_DEFAULTS[lang], usage: '' };
    setProductUsage(np);
    state.one[0].products.push(np);
    applyOneMeta();
    buildEditorBlocks();
    renderDM();
  }
}

function deleteOneProd(idx) {
  state.one[0].products.splice(idx, 1);
  applyOneMeta();
  buildEditorBlocks();
  renderDM();
}

/* 帶入單一商品自己的用途（換商品時用，不影響其他商品已手改的用途） */
function setProductUsage(prod) {
  const cp = getCopy(prod.prodId);
  prod.usage = cp ? cp.usage : '';
}

/* 一格：標題取「主商品」介紹；原價＝所有所選商品建議售價加總，定價預設＝原價（無則 5000）。
   用途為各商品各自擁有（見 setProductUsage），此處不更動。 */
function applyOneMeta() {
  const c = state.one[0];
  const main = c.products.find(p => p.role === 'main');
  const cp = main ? getCopy(main.prodId) : null;
  c.headline = cp ? cp.intro : '';
  applyPricing(c, c.products.map(p => p.prodId));
}

function onOneProdId(idx, val) {
  const prod = state.one[0].products[idx];
  prod.prodId = val;
  setProductUsage(prod);   // 換商品→帶入該商品自己的用途
  applyOneMeta();          // 主商品可能變→標題；價格加總
  buildEditorBlocks();
  renderDM();
}

function onOneProdRole(idx, role) {
  state.one[0].products[idx].role = role;
  applyOneMeta();          // 主商品改變→標題；用途維持各商品自己的
  buildEditorBlocks();
  renderDM();
}

function onOneProdField(idx, field, val) {
  state.one[0].products[idx][field] = val;
  renderDM();
}

function setLayout(l) {
  taglines[layout] = document.getElementById('dm-tagline')?.value || '';
  subtitles[layout] = document.getElementById('dm-subtitle')?.value || '';
  layout = l;
  ['four','two','one'].forEach(k =>
    document.getElementById('opt-'+k).classList.toggle('active', k === l));
  document.getElementById('dm-tagline').value = taglines[l];
  const subtitleField = document.getElementById('dm-subtitle-field');
  const subtitleInput = document.getElementById('dm-subtitle');
  if (subtitleField) subtitleField.style.display = l === 'one' ? '' : 'none';
  if (subtitleInput) subtitleInput.value = subtitles[l];
  buildEditorBlocks();
  renderDM();
}

/* 預覽模式：隱藏編輯欄、預覽放大置中 */
let editorHidden = false;
function togglePreviewMode() {
  editorHidden = !editorHidden;
  document.getElementById('editorPane').style.display = editorHidden ? 'none' : 'flex';
  const txt = document.getElementById('nav-preview-txt');
  if (txt) txt.textContent = editorHidden ? t('previewOff') : t('previewOn');
  setTimeout(scaleSheet, 50);
}

/* ══════════════════════════════════════════════
   SCALING  (vertical + horizontal centre)
══════════════════════════════════════════════ */
function scaleSheet() {
  const pane = document.getElementById('previewPane');
  const wrap = document.getElementById('dmWrap');
  const W = isLandscape() ? 842 : 595;
  const H = isLandscape() ? 595 : 842;
  const scale = Math.min(
    (pane.offsetWidth  - 48) / W,
    (pane.offsetHeight - 36) / H
  );
  wrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

/* ══════════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════════ */
/* 匯出函式庫延遲載入：頁面啟動不再被 CDN 阻塞，按下匯出時才抓（之後快取重用） */
let exportLibsPromise = null;
function ensureExportLibs() {
  if (window.html2canvas && window.jspdf) return Promise.resolve();
  if (!exportLibsPromise) {
    const load = src => new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src; s.crossOrigin = 'anonymous';
      s.onload = res; s.onerror = () => { exportLibsPromise = null; rej(new Error('load failed: ' + src)); };
      document.head.appendChild(s);
    });
    exportLibsPromise = Promise.all([
      window.html2canvas ? Promise.resolve() : load('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
      window.jspdf ? Promise.resolve() : load('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
    ]);
  }
  return exportLibsPromise;
}

async function generateCanvas() {
  await ensureExportLibs();
  /* 直接渲染真正的 #dm-sheet（不用 proxy）：樣式天生與預覽一致，
     也避免「重複 id」造成 html2canvas 卡死。
     渲染前暫時把預覽縮放(transform)設為 1，使輸出為原生 A4 尺寸，完成後還原。 */
  const real = document.getElementById('dm-sheet');
  const wrap = document.getElementById('dmWrap');
  const W = isLandscape() ? 842 : 595;
  const H = isLandscape() ? 595 : 842;
  const prevTransform = wrap.style.transform;
  const prevShadow = real.style.boxShadow;
  wrap.style.transform = 'translate(-50%, -50%) scale(1)';
  real.style.boxShadow = 'none';

  try {
    // 等圖片載入；每張最多等 4 秒，避免任一張未觸發 load 而永久卡住
    await Promise.all([...real.querySelectorAll('img')].map(img =>
      (img.complete && img.naturalWidth) ? Promise.resolve() :
        new Promise(r => {
          img.addEventListener('load', r, { once: true });
          img.addEventListener('error', r, { once: true });
          setTimeout(r, 4000);
        })
    ));
    // 用 setTimeout 而非 requestAnimationFrame：rAF 在背景分頁不會觸發會導致卡住
    await new Promise(r => setTimeout(r, 30));

    const canvas = await html2canvas(real, {
      scale: 2,
      width: W,
      height: H,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });
    return canvas;
  } finally {
    wrap.style.transform = prevTransform;
    real.style.boxShadow = prevShadow;
  }
}

async function exportPDF() {
  const btns = [...document.querySelectorAll('.nav-btn, .btn-export-main')];
  btns.forEach(b => { b.dataset.orig = b.innerHTML; b.innerHTML = t('generating'); b.disabled = true; });

  try {
    const canvas = await generateCanvas();
    const { jsPDF } = window.jspdf;
    const land = isLandscape();
    const pdf = new jsPDF({ orientation: land ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });
    const [pw, ph] = land ? [297, 210] : [210, 297];
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, pw, ph);
    pdf.save("O'right PRO DM.pdf");
  } catch (e) {
    console.error('PDF export failed:', e);
    alert(t('pdfFail'));
  } finally {
    btns.forEach(b => { b.innerHTML = b.dataset.orig; b.disabled = false; });
  }
}

async function exportJPG() {
  const btns = [...document.querySelectorAll('.nav-btn, .btn-export-main')];
  btns.forEach(b => { b.dataset.orig = b.innerHTML; b.innerHTML = t('generating'); b.disabled = true; });

  try {
    const canvas = await generateCanvas();
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const link = document.createElement('a');
    link.download = "O'right PRO DM.jpg";
    link.href = dataUrl;
    link.click();
  } catch (e) {
    console.error('JPG export failed:', e);
    alert(t('jpgFail'));
  } finally {
    btns.forEach(b => { b.innerHTML = b.dataset.orig; b.disabled = false; });
  }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
/* DOMContentLoaded 即初始化（不等整頁資源），loading 動態只等預覽畫布內的圖片 → 更快開始可用 */
window.addEventListener('DOMContentLoaded', () => {
  const restored = loadState();
  if (!restored) {
    // 首次使用：以 Excel 文案套用初始預設（標題/用途/原價加總/定價＝原價或 5000）
    state.four.forEach(applyMainCopy);
    state.two.forEach(applyMainCopy);
    state.one[0].products.forEach(setProductUsage);
    applyOneMeta();
  } else {
    // 還原上次編輯：同步語言／底圖／版面等 UI 狀態（不重新帶入文案，保留手改內容）
    ['zh', 'en', 'pl'].forEach(k => document.getElementById('lang-' + k).classList.toggle('active', k === lang));
    applyStaticUI();
    ['portrait', 'h1', 'h2', 'h3'].forEach(k => document.getElementById('bg-' + k).classList.toggle('active', k === bgTemplate));
    const optFour = document.getElementById('opt-four');
    if (optFour) optFour.style.display = (bgTemplate === 'h1') ? 'none' : '';
    ['four', 'two', 'one'].forEach(k => document.getElementById('opt-' + k).classList.toggle('active', k === layout));
    const subtitleField = document.getElementById('dm-subtitle-field');
    if (subtitleField) subtitleField.style.display = layout === 'one' ? '' : 'none';
    const tagInput = document.getElementById('dm-tagline');
    if (tagInput) tagInput.value = taglines[layout] ?? tagInput.value;
    const subInput = document.getElementById('dm-subtitle');
    if (subInput) subInput.value = subtitles[layout] ?? '';
  }
  buildEditorBlocks();
  renderDM();
  scaleSheet();
  hidePreviewLoading();
});
window.addEventListener('resize', scaleSheet);

/* 畫布圖片（底圖／產品圖）載入完成後移除 loading；最多等 5 秒保底 */
function hidePreviewLoading() {
  const el = document.getElementById('preview-loading');
  if (!el) return;
  const done = () => {
    el.classList.add('hide');
    // 保底：淡出後強制移除（背景分頁 CSS transition 可能不前進，避免卡住不消失）
    setTimeout(() => { el.style.display = 'none'; }, 400);
  };
  const imgs = [...document.querySelectorAll('#dm-sheet img')];
  const pending = imgs.filter(i => !(i.complete && i.naturalWidth));
  if (!pending.length) { done(); return; }
  let left = pending.length;
  const tick = () => { if (--left <= 0) done(); };
  pending.forEach(i => { i.addEventListener('load', tick, { once: true }); i.addEventListener('error', tick, { once: true }); });
  setTimeout(done, 5000);
}
