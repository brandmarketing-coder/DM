<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'right PRO | DM 編輯器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<!-- 商品清單與產品文案（由 tools/build-copy.mjs 從 產品圖片/ 與 產品文案 CSV 自動產生） -->
<script src="products.js"></script>
<script src="product-copy.js"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  background: #e2e0dc; height: 100vh; overflow: hidden; color: #333;
}

/* ── Navbar ── */
.navbar {
  height: 52px; background: #1c1c1c; color: white;
  display: flex; align-items: center; padding: 0 20px; gap: 10px;
  flex-shrink: 0; user-select: none;
}
.nav-logo { font-size: 14px; letter-spacing: 1px; color: white; font-weight: 400; display: flex; align-items: center; gap: 4px; }
.nav-logo .dot { width: 9px; height: 9px; background: #7ec850; border-radius: 50%; }
.nav-logo-img { height: 32px; width: auto; display: block; }
.nav-title { font-size: 13px; color: #888; font-weight: 300; }
.nav-spacer { flex: 1; }
.nav-btn {
  padding: 6px 14px; border-radius: 6px; cursor: pointer; border: none;
  font-size: 12px; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 5px; transition: background 0.15s;
}
.nav-btn-export { background: #3a7d44; color: white; }
.nav-btn-export:hover { background: #2d6235; }
.nav-btn-export-jpg { background: #5c8f52; color: white; }
.nav-btn-export-jpg:hover { background: #4b7543; }
.nav-btn-preview { background: transparent; color: #bbb; border: 1px solid #444; }
.nav-btn-preview:hover { border-color: #888; color: white; }

/* ── Workspace ── */
.workspace { display: flex; height: calc(100vh - 52px); }

/* ── Preview Pane ── */
.preview-pane { flex: 1; background: #d0cdc9; position: relative; overflow: hidden; }

/* ── DM Sheet wrapper: absolutely centred ── */
.dm-wrap {
  position: absolute; top: 50%; left: 50%;
  transform-origin: center center; /* transform set by JS */
}

/* ══════════════════════════════════════════
   DM SHEET  (A4: 595 × 842 px)
══════════════════════════════════════════ */
#dm-sheet {
  width: 595px; height: 842px;
  display: flex; flex-direction: column;
  background: white;
  box-shadow: 0 8px 40px rgba(0,0,0,0.28);
  overflow: hidden; /* hard clip — no scrollbars ever */
}

/* Header / Footer images */
.dm-hdr, .dm-ftr { flex-shrink: 0; line-height: 0; width: 100%; }
.dm-hdr img, .dm-ftr img { width: 100%; display: block; }

/* Content zone */
.dm-content { flex: 1; min-height: 0; display: flex; flex-direction: column; background: white; overflow: hidden; }

/* Tagline */
.dm-tagline {
  flex-shrink: 0;
  text-align: center; padding: 11px 24px 5px;
  font-size: 16px; letter-spacing: 4px; color: #666; font-weight: 300;
}
.dm-subtitle {
  flex-shrink: 0;
  text-align: center; padding: 0 24px 8px;
  font-size: 18pt; letter-spacing: 1px; color: #666; font-weight: 300;
  line-height: 1.35;
}

/* ══════════════════════════════════════════
   FOUR-GRID  (2 × 2 independent cells)
══════════════════════════════════════════ */
.dm-four-grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  padding: 2px 6px 6px;
}

.dm-cell {
  display: flex; flex-direction: column;
  padding: 8px 12px 8px;
  min-height: 0; overflow: hidden;
}
/* inner borders */
.dm-cell:nth-child(1),
.dm-cell:nth-child(3) { border-right: 1px solid #dedad6; }
.dm-cell:nth-child(1),
.dm-cell:nth-child(2) { border-bottom: 1px solid #dedad6; }

/* Image area — fixed height so text is never squeezed out */
.dm-cell-imgs {
  height: 130px; flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 4px; overflow: hidden;
}
.dm-cell-img-slot {
  min-width: 0;
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
  height: 100%;
}
.dm-cell-img-slot img {
  max-width: 100%; max-height: 100%; object-fit: contain; display: block;
}
.dm-cell-img-slot.is-main { flex: 0 0 80px; }
.dm-cell-img-slot.is-gift  { flex: 0 0 50px; }
.dm-cell-img-slot.is-main:only-child { flex: 0 0 auto; max-width: 110px; }

/* Cell text */
.dm-cell-text { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; padding-top: 4px; }
.dm-cell-headline { font-size: 16px; font-weight: 400; color: #1a1a1a; line-height: 1.35; margin-bottom: 2px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.dm-cell-names { font-size: 12px; color: #aaa; line-height: 1.5; margin-bottom: 3px; }
.dm-cell-gift-name { color: #c0bbb5; }
.dm-cell-price-row { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
.dm-cell-price     { font-size: 22px; font-weight: 400; color: #1a1a1a; letter-spacing: 0.3px; }
.dm-cell-unit      { font-size: 14px; color: #555; }
.dm-cell-orig      { font-size: 12px; color: #c0bbb5; }

/* ══════════════════════════════════════════
   TWO-GRID  (2 stacked bundles)
══════════════════════════════════════════ */
.dm-two-rows { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.dm-bundle-row {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 8px 28px 10px; overflow: hidden;
}
.dm-bundle-row + .dm-bundle-row { border-top: 1px solid #dedad6; }

/* Products — each product is a column: image above, name below, bottoms aligned */
.dm-bundle-pair {
  flex: 1; min-height: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 20px; overflow: hidden; padding-bottom: 2px;
}
.dm-bprod { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.dm-bprod-img {
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
}
.dm-bprod-img img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.dm-gift-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px; background: #19322F; color: white;
  height: 24px;
  padding: 0 10px 0 11px;
  border-radius: 12px; margin-bottom: 14px;
  letter-spacing: 1px; font-style: normal; line-height: 1;
}
.dm-bprod-name {
  font-size: 12px; color: #999; text-align: center;
  margin-top: 5px; line-height: 1.3;
}
/* Two-grid image sizes: gift ~2/3 height of main, bottoms align via flex-end on parent */
.dm-bundle-pair .dm-bprod.is-main .dm-bprod-img { width: 118px; height: 152px; }
.dm-bundle-pair .dm-bprod.is-gift .dm-bprod-img  { width: 78px;  height: 102px; }
/* 單一商品（無贈品）：高度同主商品(152)以免超出容器被裁切，寬度略大維持存在感 */
.dm-bundle-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: 124px; height: 152px; }

/* Bundle price */
.dm-bundle-price-row {
  flex-shrink: 0; display: flex; align-items: baseline;
  gap: 8px; flex-wrap: wrap; padding-top: 5px;
  justify-content: center;
}
.dm-headline-lbl { font-size: 15px; color: #555; letter-spacing: 0.5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 100%; }
.dm-price-num   { font-size: 32px; font-weight: 400; color: #1a1a1a; letter-spacing: 0.3px; }
.dm-price-unit  { font-size: 18px; color: #444; }
.dm-orig-price  { font-size: 12px; color: #c0bbb5; }

/* ══════════════════════════════════════════
   ONE-GRID  (single centred product)
══════════════════════════════════════════ */
.dm-one-block {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 36px 14px; overflow: hidden;
}

/* One-grid pair: 每個商品為等寬欄（與下方用途欄對齊），圖置中、底部對齊 */
.dm-one-pair {
  flex-shrink: 0; width: 100%;
  display: flex; align-items: flex-end; justify-content: center;
  gap: var(--colGap, 24px); overflow: hidden;
}
.dm-one-pair > .dm-bprod { flex: 1 1 0; min-width: 0; }
/* 圖片尺寸乘上 --imgScale（預設 1），供自動縮放避免長用途文字爆版 */
.dm-one-pair .dm-bprod.is-main .dm-bprod-img  { width: calc(170px * var(--imgScale, 1)); height: calc(240px * var(--imgScale, 1)); }
.dm-one-pair .dm-bprod.is-gift .dm-bprod-img   { width: calc(115px * var(--imgScale, 1)); height: calc(161px * var(--imgScale, 1)); }
.dm-one-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: calc(195px * var(--imgScale, 1)); height: calc(275px * var(--imgScale, 1)); }
.dm-one-pair .dm-bprod-name { font-size: 19px; }

/* Styling adjustments when there are 3 products in one-grid layout（欄距改由 --colGap 控制） */
.dm-one-pair.has-3-prods .dm-bprod.is-main .dm-bprod-img {
  width: calc(155px * var(--imgScale, 1));
  height: calc(220px * var(--imgScale, 1));
}
.dm-one-pair.has-3-prods .dm-bprod.is-gift .dm-bprod-img {
  width: calc(105px * var(--imgScale, 1));
  height: calc(148px * var(--imgScale, 1));
}
.dm-one-pair.has-3-prods .dm-bprod-name {
  font-size: 14px;
}
.dm-one-pair.has-3-prods .dm-gift-badge {
  font-size: 15px;
  height: 26px;
  padding: 0 12px 0 13px;
  border-radius: 13px;
  margin-bottom: 10px;
}

/* 一格「用途說明」：左右分欄（幾個商品幾欄）；主管指定 8~10pt，--usageFS 由自動縮放調整 */
.dm-one-usage {
  flex-shrink: 0; width: 100%;
  display: flex; justify-content: center; align-items: flex-start; gap: var(--colGap, 24px);
  font-size: var(--usageFS, 9pt); line-height: 1.55; color: #777;
  padding: 8px 0 0;   /* 不加左右內距，使用途欄寬與上方商品欄完全一致 */
}
/* 每欄與上方商品同寬；用途文字區塊靠各欄左界對齊（兩段文字左邊緣一致 → 整齊兩欄、不歪）
   區塊本身為內容寬（最長行）故香調等短行不被強制換行，僅長段落於欄寬處自動換行 */
.dm-one-usage-col { flex: 1 1 0; min-width: 0; display: flex; justify-content: flex-start; }
.dm-one-usage-col:only-child { flex: 0 1 460px; justify-content: center; }
.dm-one-usage-text { display: inline-block; max-width: 100%; text-align: left; white-space: pre-line; }

.dm-one-price-row {
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 10px; gap: 5px;
}
.dm-one-price-main {
  display: flex; align-items: baseline;
  gap: 8px; flex-wrap: wrap; justify-content: center;
}
/* 一格標題／促銷標語：獨立一行、置中、可換行；字級由自動縮放控制（--headlineFS） */
.dm-one-headline {
  flex-shrink: 0; width: 100%;
  font-size: var(--headlineFS, 24px); font-weight: 500; color: #555;
  text-align: center; line-height: 1.3; padding: 6px 18px 0; word-break: break-word;
}

/* One-grid specific text overrides to make them really stand out */
.is-two-grid .dm-tagline { font-size: 24pt; }
.is-one-grid .dm-tagline { font-size: 32pt; font-weight: 300; padding: 18px 24px 10px; }
.dm-one-pair .dm-gift-badge {
  font-size: 22px;
  height: 38px;
  padding: 0 18px 0 19px;
  border-radius: 19px;
  margin-bottom: 18px;
}
.dm-one-block .dm-price-num { font-size: 42px; font-weight: 500; }
.dm-one-block .dm-price-unit { font-size: 22px; }
.dm-one-block .dm-orig-price { font-size: 15px; }

/* ══════════════════════════════════════════
   EDITOR PANE
══════════════════════════════════════════ */
.editor-pane {
  width: 390px; flex-shrink: 0;
  background: white; border-left: 1px solid #d0cdc9;
  display: flex; flex-direction: column; overflow: hidden;
}
.editor-scroll { flex: 1; overflow-y: auto; }
.editor-sec { padding: 14px 14px 12px; border-bottom: 1px solid #eee; }
.editor-sec-num { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 12px; }

/* Layout picker */
.layout-pick { display: flex; gap: 8px; }
.layout-opt {
  flex: 1; border: 2px solid #e2e2e2; border-radius: 8px;
  padding: 9px 6px; cursor: pointer; text-align: center;
  transition: border-color 0.15s, background 0.15s;
}
.layout-opt:hover { border-color: #5aaa6a; }
.layout-opt.active { border-color: #3a7d44; background: #f0f7f1; }
.lt-thumb {
  width: 46px; height: 56px; margin: 0 auto 6px;
  background: #ddd; display: grid; gap: 2px; padding: 4px; border-radius: 2px;
}
.lt-thumb.lt4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.lt-thumb.lt2 { grid-template-columns: 1fr;     grid-template-rows: 1fr 1fr; }
.lt-thumb.lt1 { grid-template-columns: 1fr;     grid-template-rows: 1fr; }
.lt-thumb > div { background: white; border-radius: 1px; }
.lt-label { font-size: 12px; color: #666; }
.layout-opt.active .lt-label { color: #3a7d44; font-weight: 600; }

/* Fields */
.field-lbl { font-size: 10.5px; color: #888; margin-bottom: 3px; display: block; }
.field-input {
  width: 100%; padding: 6px 9px; border: 1px solid #ddd; border-radius: 5px;
  font-size: 12px; color: #333; outline: none; background: #fafafa;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: #5aaa6a; background: white; }

/* Block editor */
.block-ed {
  background: #f8f7f5; border-radius: 7px; padding: 10px 10px 9px;
  margin-top: 10px; border: 1px solid #ede9e5;
}
.block-ed-title { font-size: 10.5px; font-weight: 700; color: #555; margin-bottom: 9px; }

.prod-pair { display: flex; gap: 7px; margin-bottom: 8px; }
.prod-slot { flex: 1; min-width: 0; }
.prod-slot-lbl { font-size: 9.5px; color: #aaa; margin-bottom: 3px; }
.prod-thumb-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.prod-thumb {
  width: 30px; height: 30px; object-fit: contain;
  border: 1px solid #e5e5e5; border-radius: 4px; background: #f5f5f5; flex-shrink: 0;
}
.prod-sel {
  width: 100%; padding: 4px 5px; border: 1px solid #ddd; border-radius: 4px;
  font-size: 9.5px; color: #333; background: white; outline: none;
}
.prod-sel:focus { border-color: #5aaa6a; }

.price-pair { display: flex; gap: 7px; margin-top: 2px; }
.price-slot { flex: 1; }
.price-slot label { font-size: 9.5px; color: #aaa; display: block; margin-bottom: 2px; }
.price-input {
  width: 100%; padding: 5px 7px; border: 1px solid #ddd; border-radius: 4px;
  font-size: 12px; outline: none; background: #fafafa;
}
.price-input:focus { border-color: #5aaa6a; background: white; }

.headline-field { margin-bottom: 7px; }

/* Export */
.editor-footer { flex-shrink: 0; }
.btn-export-main {
  display: block; width: 100%; padding: 14px;
  background: #3a7d44; color: white; border: none;
  font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: background 0.15s;
}
.btn-export-main:hover { background: #2d6235; }
.export-note { font-size: 9.5px; color: #bbb; text-align: center; padding: 6px 10px; }

/* ── Responsive ── */

/* Medium: tablet landscape / small laptop — keep side-by-side, narrow editor */
@media (max-width: 960px) {
  .editor-pane { width: 300px; }
  .block-ed { padding: 8px 8px 7px; }
}

/* Small: tablet portrait / mobile — stack vertically, page scrolls */
@media (max-width: 700px) {
  body { height: auto; overflow: auto; }

  /* Navbar wraps if needed */
  .navbar { height: auto; flex-wrap: wrap; padding: 8px 14px; gap: 6px; }
  .nav-spacer { flex: 1 0 100%; display: none; }
  .nav-title { display: none; }

  /* Stack preview above editor */
  .workspace { flex-direction: column; height: auto; overflow: visible; }

  /* Preview: fixed height so the scaled A4 always shows */
  .preview-pane { flex: none; height: 380px; min-height: 0; }

  /* Editor: full width, flows in document */
  .editor-pane {
    width: 100%; height: auto;
    border-left: none; border-top: 1px solid #d0cdc9;
    overflow: visible; flex-shrink: 0;
  }
  .editor-scroll { overflow-y: visible; height: auto; }

  /* Product selector pair: stack vertically so dropdowns are full width */
  .prod-pair { flex-direction: column; gap: 6px; }
  .prod-sel { font-size: 11px; }

  /* Layout picker: stay horizontal, allow small size */
  .lt-thumb { width: 36px; height: 44px; }
  .lt-label { font-size: 11px; }
}

/* ── Print ── */
@media print {
  @page { size: 210mm 297mm; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  /*
   * Chrome prints at 96dpi → A4 = 793 × 1122 CSS px.
   * Our sheet is designed at 595 × 842 px (screen preview).
   * zoom: 1.334 scales 595 × 1.334 = 793 px  &  842 × 1.334 = 1123 px,
   * filling A4 exactly while preserving every fixed-px proportion.
   */
  html {
    zoom: 1.333; /* 842 × 1.333 = 1122.5 px = A4 height at 96 dpi — exact fit */
    width: 595px !important; height: auto !important;
    overflow: visible !important;
    margin: 0 !important; padding: 0 !important;
    background: none !important;
  }
  body {
    width: 595px !important; height: auto !important;
    overflow: visible !important;
    background: none !important; margin: 0 !important; padding: 0 !important;
  }
  .navbar, .editor-pane { display: none !important; }
  .workspace {
    display: block !important; width: 595px !important;
    height: auto !important; overflow: visible !important;
  }
  .preview-pane {
    position: static !important; display: block !important;
    background: none !important; overflow: visible !important;
    width: 595px !important; height: auto !important;
    padding: 0 !important; margin: 0 !important;
  }
  .dm-wrap {
    position: static !important; transform: none !important;
    display: block !important;
    margin: 0 !important; padding: 0 !important;
  }
  #dm-sheet {
    width: 595px !important; height: 842px !important;
    box-shadow: none !important; overflow: visible !important;
    display: flex !important;
  }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <img src="logo_new.png" alt="O'right PRO" class="nav-logo-img">
  <span style="color:#3a3a3a;margin:0 10px">|</span>
  <span class="nav-title">DM 編輯器</span>
  <div class="nav-spacer"></div>
  <button class="nav-btn nav-btn-export-jpg" onclick="exportJPG()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    匯出 JPG
  </button>
  <button class="nav-btn nav-btn-export" onclick="exportPDF()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    匯出 PDF (A4)
  </button>
</nav>

<div class="workspace">
  <div class="preview-pane" id="previewPane">
    <div class="dm-wrap" id="dmWrap">
      <div id="dm-sheet"></div>
    </div>
  </div>

  <div class="editor-pane" id="editorPane">
    <div class="editor-scroll">
      <!-- 1. Layout -->
      <div class="editor-sec">
        <div class="editor-sec-num">1. 選擇版面</div>
        <div class="layout-pick">
          <div class="layout-opt active" id="opt-four" onclick="setLayout('four')">
            <div class="lt-thumb lt4"><div></div><div></div><div></div><div></div></div>
            <div class="lt-label">四格</div>
          </div>
          <div class="layout-opt" id="opt-two" onclick="setLayout('two')">
            <div class="lt-thumb lt2"><div></div><div></div></div>
            <div class="lt-label">兩格</div>
          </div>
          <div class="layout-opt" id="opt-one" onclick="setLayout('one')">
            <div class="lt-thumb lt1"><div></div></div>
            <div class="lt-label">一格</div>
          </div>
        </div>
      </div>

      <!-- 2. Content -->
      <div class="editor-sec" style="border-bottom:none">
        <div class="editor-sec-num">2. 編輯內容</div>
        <div style="margin-bottom:4px">
          <label class="field-lbl">標題文字</label>
          <input type="text" id="dm-tagline" class="field-input"
            value="永續美妝 Sustainable Beauty" oninput="renderDM()">
        </div>
        <div id="dm-subtitle-field" style="margin-bottom:4px; display:none">
          <label class="field-lbl">副標題（選填）</label>
          <input type="text" id="dm-subtitle" class="field-input"
            value="" placeholder="例：抗暑，從頭噴到腳底的救星" oninput="renderDM()">
        </div>
        <div id="block-editors"></div>
      </div>
    </div>
    <div class="editor-footer">
      <button class="btn-export-main" onclick="exportPDF()">匯出 PDF (A4)</button>
      <p class="export-note">* 匯出將依目前預覽內容產生 PDF，格式為 A4 直式 *</p>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   PRODUCTS
══════════════════════════════════════════════ */
const PRODUCTS = window.PRODUCTS || [];   /* 清單外移至 products.js，由 tools/build-copy.mjs 產生 */

/* ══════════════════════════════════════════════
   STATE
   cells[0..3] used by all layouts:
   four  → cells[0..3]  (2×2 grid)
   two   → cells[0..1]  (2 rows)
   one   → cells[0]     (single)
══════════════════════════════════════════════ */
let layout = 'four';

const mkCell = (pid, gid, hl, price, orig, gl) => ({
  prodId: pid, giftId: gid||'', headline: hl||'', usage: '', price: price||'', origPrice: orig||'',
  giftLabel: gl || '致贈'
});

/* Each layout has its own independent content */
const state = {
  four: [
    mkCell('咖啡因養髮液100mL',     '咖啡因養髮液10mL'),
    mkCell('咖啡因麥拉寧養髮液100mL','咖啡因麥拉寧養髮液10mL'),
    mkCell('男士養髮液70mL',        ''),
    mkCell('女士養髮液70mL',        ''),
  ],
  two: [
    mkCell('豐盈彈韌洗髮露500mL', '豐盈彈韌精華油10mL'),
    mkCell('結構修護洗髮露500mL', '染燙護色精華油10mL'),
  ],
  one: [
    {
      products: [
        { prodId: '咖啡因養髮液100mL', role: 'main', giftLabel: '致贈', usage: '' },
        { prodId: '咖啡因養髮液10mL',  role: 'sub',  giftLabel: '致贈', usage: '' }
      ],
      headline: '',
      price: '',
      origPrice: ''
    }
  ],
};

const taglines = {
  four: '永續美妝 Sustainable Beauty',
  two:  '永續美妝',
  one:  '永續美妝',
};

const subtitles = {
  four: '',
  two:  '',
  one:  '',
};

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const getProd = id => PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
const getProdOrNull = id => id ? (PRODUCTS.find(p => p.id === id) || null) : null;

/* 取得某商品的文案（介紹／用途），以 copyKey 對應 product-copy.js；查不到回 null */
function getCopy(prodId) {
  const p = getProdOrNull(prodId);
  if (!p || !p.copyKey) return null;
  return (window.PRODUCT_COPY || {})[p.copyKey] || null;
}

/* 該商品（依其容量）的建議售價；無則 0 */
const getOrigNum = id => { const p = getProdOrNull(id); return p && p.orig ? Number(p.orig) : 0; };

/* 標題／促銷標語：收斂換行為空白（避免禮盒等多行介紹塞進標題時爆版） */
const cleanHeadline = s => (s || '').replace(/\r?\n+/g, ' ').replace(/[ 　]{2,}/g, ' ').trim();

/* 原價＝所選產品（主商品＋贈品/輔助商品）建議售價「加總」。
   定價預設＝原價；若無原價（加總為 0）則定價寫 5000、原價留空（不顯示）。 */
function applyPricing(cell, prodIds) {
  const sum = prodIds.filter(Boolean).reduce((s, id) => s + getOrigNum(id), 0);
  cell.origPrice = sum > 0 ? String(sum) : '';
  cell.price     = sum > 0 ? String(sum) : '5000';
}

/* 依「主商品」帶入文字：標題←介紹、用途←用途；沒寫的留空（不亂填）。
   介紹／用途一律取主商品，價格依所選產品加總。 */
function applyMainCopy(cell) {
  const cp = getCopy(cell.prodId);
  cell.headline = cp ? cp.intro : '';
  cell.usage    = cp ? cp.usage : '';
  applyPricing(cell, [cell.prodId, cell.giftId]);
}

function fmt(v) {
  const n = v ? v.toString().replace(/,/g, '') : '';
  if (!n || isNaN(Number(n)) || n === '0') return n || '0';
  return Number(n).toLocaleString('zh-TW');
}

function enc(path) {
  return path.split('/').map((s, i) => i === 0 ? s : encodeURIComponent(s)).join('/');
}

/* ══════════════════════════════════════════════
   DM RENDER — FOUR  (2×2 grid, 4 independent cells)
══════════════════════════════════════════════ */
function cellHTML(c) {
  const mp = getProd(c.prodId);
  const gp = getProdOrNull(c.giftId);

  const giftSlot = gp ? `
    <div class="dm-cell-img-slot is-gift">
      <img src="${enc(gp.img)}" alt="${gp.name}" onerror="this.style.opacity=0.1">
    </div>` : '';

  const giftName = gp ? `<br><span class="dm-cell-gift-name">（${c.giftLabel}）${gp.name}</span>` : '';

  const orig = c.origPrice && c.origPrice !== '0'
    ? `<span class="dm-cell-orig">原價NT$${fmt(c.origPrice)}</span>` : '';

  return `
    <div class="dm-cell">
      <div class="dm-cell-imgs">
        <div class="dm-cell-img-slot is-main">
          <img src="${enc(mp.img)}" alt="${mp.name}" onerror="this.style.opacity=0.1">
        </div>
        ${giftSlot}
      </div>
      <div class="dm-cell-text">
        ${c.headline ? `<div class="dm-cell-headline">${cleanHeadline(c.headline)}</div>` : ''}
        <div class="dm-cell-names">${mp.name}${giftName}</div>
        <div class="dm-cell-price-row">
          <span class="dm-cell-price">${fmt(c.price)}</span>
          <span class="dm-cell-unit">元</span>
          ${orig}
        </div>
      </div>
    </div>`;
}

function renderFour(tag) {
  return `
    <div class="dm-content">
      <div class="dm-tagline">${tag}</div>
      <div class="dm-four-grid">
        ${state.four.map(cellHTML).join('')}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   DM RENDER — TWO  (2 stacked bundles)
══════════════════════════════════════════════ */
function bundleRowHTML(c) {
  const mp = getProd(c.prodId);
  const gp = getProdOrNull(c.giftId);

  const giftCol = gp ? `
    <div class="dm-bprod is-gift">
      <div class="dm-gift-badge">${c.giftLabel}</div>
      <div class="dm-bprod-img">
        <img src="${enc(gp.img)}" alt="${gp.name}" onerror="this.style.opacity=0.1">
      </div>
      <div class="dm-bprod-name">${gp.name}</div>
    </div>` : '';

  const orig = c.origPrice && c.origPrice !== '0'
    ? `<span class="dm-orig-price">（原價NT$${fmt(c.origPrice)}）</span>` : '';

  const hl = c.headline
    ? `<span class="dm-headline-lbl">${cleanHeadline(c.headline)}</span>` : '';

  return `
    <div class="dm-bundle-row">
      <div class="dm-bundle-pair">
        <div class="dm-bprod is-main">
          <div class="dm-bprod-img">
            <img src="${enc(mp.img)}" alt="${mp.name}" onerror="this.style.opacity=0.1">
          </div>
          <div class="dm-bprod-name">${mp.name}</div>
        </div>
        ${giftCol}
      </div>
      <div class="dm-bundle-price-row">
        ${hl}
        <span class="dm-price-num">${fmt(c.price)}</span>
        <span class="dm-price-unit">元</span>
        ${orig}
      </div>
    </div>`;
}

function renderTwo(tag) {
  return `
    <div class="dm-content is-two-grid">
      <div class="dm-tagline">${tag}</div>
      <div class="dm-two-rows">
        ${bundleRowHTML(state.two[0])}
        ${bundleRowHTML(state.two[1])}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   DM RENDER — ONE  (single centred)
══════════════════════════════════════════════ */
function renderOne(tag, subtitle) {
  const c = state.one[0];
  
  // Render each product dynamically based on its role
  const prodsHtml = c.products.map(p => {
    const prod = getProd(p.prodId);
    if (p.role === 'main') {
      return `
        <div class="dm-bprod is-main">
          <div class="dm-bprod-img">
            <img src="${enc(prod.img)}" alt="${prod.name}" onerror="this.style.opacity=0.1">
          </div>
          <div class="dm-bprod-name">${prod.name}</div>
        </div>
      `;
    } else {
      return `
        <div class="dm-bprod is-gift">
          <div class="dm-gift-badge">${p.giftLabel || '致贈'}</div>
          <div class="dm-bprod-img">
            <img src="${enc(prod.img)}" alt="${prod.name}" onerror="this.style.opacity=0.1">
          </div>
          <div class="dm-bprod-name">${prod.name}</div>
        </div>
      `;
    }
  }).join('');

  const orig = c.origPrice && c.origPrice !== '0'
    ? `<span class="dm-orig-price">（原價NT$${fmt(c.origPrice)}）</span>` : '';

  const hlBlock = c.headline
    ? `<div class="dm-one-headline">${cleanHeadline(c.headline)}</div>` : '';

  const has3Prods = c.products.length >= 3;
  const pairClass = has3Prods ? 'dm-one-pair has-3-prods' : 'dm-one-pair';
  const colGap = has3Prods ? 16 : 28;

  // 用途：每個商品一欄，與上方商品對齊；相同用途（同產品）只寫一次（重複者留空）；不顯示品名
  const seenUsage = new Set();
  let anyUsage = false;
  const usageCols = c.products.map(p => {
    const u = (p.usage || '').trim();
    if (!u || seenUsage.has(u)) return `<div class="dm-one-usage-col"></div>`;
    seenUsage.add(u); anyUsage = true;
    return `<div class="dm-one-usage-col"><span class="dm-one-usage-text">${u}</span></div>`;
  }).join('');
  const usageHtml = anyUsage ? `<div class="dm-one-usage">${usageCols}</div>` : '';

  return `
    <div class="dm-content is-one-grid">
      <div class="dm-tagline">${tag}</div>
      ${subtitle ? `<div class="dm-subtitle">${subtitle}</div>` : ''}
      <div class="dm-one-block" style="--colGap:${colGap}px">
        <div class="${pairClass}">
          ${prodsHtml}
        </div>
        ${usageHtml}
        ${hlBlock}
        <div class="dm-one-price-row">
          <div class="dm-one-price-main">
            <span class="dm-price-num">${fmt(c.price)}</span>
            <span class="dm-price-unit">元</span>
          </div>
          ${orig}
        </div>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════ */
const HDR = '../沙龍DM公版/公版DM_1.jpg';
const FTR = '../沙龍DM公版/公版DM_2.jpg';

function renderDM() {
  const tag = document.getElementById('dm-tagline')?.value || '';
  const subtitle = document.getElementById('dm-subtitle')?.value || '';
  const body = layout === 'four' ? renderFour(tag)
             : layout === 'two'  ? renderTwo(tag)
             : renderOne(tag, subtitle);
  const sheet = document.getElementById('dm-sheet');
  sheet.innerHTML =
    `<div class="dm-hdr"><img src="${enc(HDR)}" alt="header"></div>` +
    body +
    `<div class="dm-ftr"><img src="${enc(FTR)}" alt="footer"></div>`;

  if (layout === 'one') {
    fitOneGrid();
    // 頁首/頁尾圖載入後內容高度才確定，載完再校正一次
    sheet.querySelectorAll('.dm-hdr img, .dm-ftr img').forEach(img => {
      if (!img.complete) img.addEventListener('load', fitOneGrid, { once: true });
    });
  }
}

/* ── 一格自動縮放：用途文字 3 行以上時，先縮字級（10→8pt），仍超出再等比縮小商品圖，
      確保內容不爆版、且文字不刪減 ── */
function fitOneGrid() {
  const block = document.querySelector('#dm-sheet .dm-one-block');
  if (!block) return;
  const overflow = () => {
    const prev = block.style.justifyContent;
    block.style.justifyContent = 'flex-start';   // 攤平以正確量測總高
    const over = block.scrollHeight - block.clientHeight;
    block.style.justifyContent = prev;
    return over;
  };
  let fs = 10, hf = 24, scale = 1, guard = 0;
  block.style.setProperty('--usageFS', fs + 'pt');
  block.style.setProperty('--headlineFS', hf + 'px');
  block.style.setProperty('--imgScale', scale);
  while (overflow() > 1 && fs > 8 && guard++ < 20) {        // 1) 縮用途字級到 8pt
    fs -= 0.5; block.style.setProperty('--usageFS', fs + 'pt');
  }
  guard = 0;
  while (overflow() > 1 && hf > 15 && guard++ < 30) {       // 2) 縮標題字級到 15px（長介紹/禮盒）
    hf -= 1; block.style.setProperty('--headlineFS', hf + 'px');
  }
  guard = 0;
  while (overflow() > 1 && scale > 0.6 && guard++ < 40) {   // 3) 仍超出→縮商品圖
    scale -= 0.05; block.style.setProperty('--imgScale', scale.toFixed(2));
  }
}

/* ══════════════════════════════════════════════
   EDITOR BLOCKS
══════════════════════════════════════════════ */
function opts(selectedId) {
  return PRODUCTS.map(p =>
    `<option value="${p.id}" ${p.id === selectedId ? 'selected' : ''}>【${p.series}】 ${p.name}</option>`
  ).join('');
}

function cellEditor(idx, title) {
  if (layout === 'one') {
    const c = state.one[0];
    const prodsHtml = c.products.map((p, i) => oneGridProductEditor(p, i)).join('');
    
    const addProdBtn = c.products.length < 3 ? `
      <button type="button" style="width: 100%; background: #3a7d44; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background 0.15s;"
        onclick="addOneProd()"
        onmouseover="this.style.background='#2d6235'" 
        onmouseout="this.style.background='#3a7d44'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增商品
      </button>
    ` : '';

    return `
      <div class="block-ed">
        <div class="block-ed-title">${title}</div>
        
        <div style="margin-bottom: 12px;">
          <span class="field-lbl" style="font-weight: 700; margin-bottom: 8px; display: block;">商品清單 (最多 3 個)</span>
          ${prodsHtml}
          ${addProdBtn}
        </div>
        
        <div class="headline-field">
          <label class="field-lbl">標題／促銷標語（選填）</label>
          <input type="text" class="field-input" style="padding:5px 8px"
            value="${c.headline}" placeholder="例：強健髮根 甦醒美麗"
            oninput="onField(${idx},'headline',this.value)">
        </div>
        <div class="price-pair">
          <div class="price-slot">
            <label>售價（元）</label>
            <input type="text" class="price-input" value="${c.price}"
              oninput="onField(${idx},'price',this.value)">
          </div>
          <div class="price-slot">
            <label>原價（元）</label>
            <input type="text" class="price-input" value="${c.origPrice}"
              oninput="onField(${idx},'origPrice',this.value)">
          </div>
        </div>
      </div>
    `;
  }

  const c = state[layout][idx], mp = getProd(c.prodId);
  const gp = c.giftId ? getProd(c.giftId) : PRODUCTS[0];
  return `
    <div class="block-ed">
      <div class="block-ed-title">${title}</div>
      <div class="prod-pair">
        <div class="prod-slot">
          <div class="prod-slot-lbl">主商品</div>
          <div class="prod-thumb-row">
            <img class="prod-thumb" id="th${idx}m" src="${enc(mp.img)}" alt="">
          </div>
          <select class="prod-sel" onchange="onProd(${idx},'prodId',this.value)">
            ${opts(c.prodId)}
          </select>
        </div>
        <div class="prod-slot">
          <div class="prod-slot-lbl">贈品（可不選）</div>
          <div class="prod-thumb-row">
            <img class="prod-thumb" id="th${idx}g" src="${enc(gp.img)}" alt="">
          </div>
          <select class="prod-sel" onchange="onProd(${idx},'giftId',this.value)">
            <option value="">— 不顯示贈品 —</option>
            ${opts(c.giftId)}
          </select>
        </div>
      </div>
      <div class="gift-label-field" id="gl-field-${idx}" style="${c.giftId ? '' : 'display:none'}">
        <label class="field-lbl">贈品標籤文字（如：致贈、附贈、組合）</label>
        <input type="text" class="field-input" style="padding:5px 8px"
          value="${c.giftLabel}" placeholder="致贈"
          oninput="onField(${idx},'giftLabel',this.value)">
      </div>
      <div class="headline-field">
        <label class="field-lbl">標題／促銷標語（選填）</label>
        <input type="text" class="field-input" style="padding:5px 8px"
          value="${c.headline}" placeholder="例：強健髮根 甦醒美麗"
          oninput="onField(${idx},'headline',this.value)">
      </div>
      <div class="price-pair">
        <div class="price-slot">
          <label>售價（元）</label>
          <input type="text" class="price-input" value="${c.price}"
            oninput="onField(${idx},'price',this.value)">
        </div>
        <div class="price-slot">
          <label>原價（元）</label>
          <input type="text" class="price-input" value="${c.origPrice}"
            oninput="onField(${idx},'origPrice',this.value)">
        </div>
      </div>
    </div>`;
}

function buildEditorBlocks() {
  let html = '';
  if (layout === 'four') {
    html = cellEditor(0,'格 A（左上）') + cellEditor(1,'格 B（右上）') +
           cellEditor(2,'格 C（左下）') + cellEditor(3,'格 D（右下）');
  } else if (layout === 'two') {
    html = cellEditor(0,'上方區塊') + cellEditor(1,'下方區塊');
  } else {
    html = cellEditor(0,'商品');
  }
  document.getElementById('block-editors').innerHTML = html;
}

/* ══════════════════════════════════════════════
   EVENT HANDLERS
══════════════════════════════════════════════ */
function onProd(idx, field, val) {
  const cell = state[layout][idx];
  cell[field] = val;

  // 換「主商品」→ 帶入標題/用途，並依加總重算原價與定價
  if (field === 'prodId') {
    applyMainCopy(cell);
  } else if (field === 'giftId') {
    // 換「贈品」→ 標題/用途維持主商品，但原價(加總)與定價需重算
    applyPricing(cell, [cell.prodId, cell.giftId]);
  }
  buildEditorBlocks();
  renderDM();
}

function onField(idx, field, val) {
  state[layout][idx][field] = val;
  renderDM();
}

function oneGridProductEditor(p, prodIdx) {
  const prod = getProd(p.prodId);
  const isMain = p.role === 'main';
  const isSub = p.role === 'sub';
  
  // Role selector (Main/Sub)
  const roleSelect = `
    <div style="margin-bottom: 6px;">
      <span class="field-lbl">商品類型</span>
      <div style="display: flex; gap: 12px; margin-top: 4px;">
        <label style="font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="radio" name="one-role-${prodIdx}" value="main" ${isMain ? 'checked' : ''} onchange="onOneProdRole(${prodIdx}, 'main')">
          主商品
        </label>
        <label style="font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer;">
          <input type="radio" name="one-role-${prodIdx}" value="sub" ${isSub ? 'checked' : ''} onchange="onOneProdRole(${prodIdx}, 'sub')">
          輔助商品 (贈品)
        </label>
      </div>
    </div>
  `;

  // Gift label input (only shown if Sub)
  const giftLabelInput = isSub ? `
    <div style="margin-top: 6px;">
      <label class="field-lbl">贈品標籤文字（如：致贈、附贈）</label>
      <input type="text" class="field-input" style="padding: 5px 8px;"
        value="${p.giftLabel || '致贈'}" placeholder="致贈"
        oninput="onOneProdField(${prodIdx}, 'giftLabel', this.value)">
    </div>
  ` : '';

  // Usage field (每個商品各自的用途，自動帶入、可修改)
  const usageInput = `
    <div style="margin-top: 6px;">
      <label class="field-lbl">用途說明（自動帶入該商品「用途」，可修改）</label>
      <textarea class="field-input" style="padding: 5px 8px; resize: vertical; min-height: 44px; line-height: 1.5;"
        placeholder="選擇商品後自動帶入"
        oninput="onOneProdField(${prodIdx}, 'usage', this.value)">${p.usage || ''}</textarea>
    </div>
  `;

  // Delete button (for any product other than the first one)
  const deleteBtn = prodIdx > 0 ? `
    <button type="button" style="background: #e53e3e; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 8px; transition: background 0.15s;" 
      onclick="deleteOneProd(${prodIdx})"
      onmouseover="this.style.background='#c53030'" 
      onmouseout="this.style.background='#e53e3e'">
      刪除此商品
    </button>
  ` : '';

  return `
    <div style="background: #fdfdfd; border: 1px solid #e2e2e2; border-radius: 6px; padding: 10px; margin-bottom: 10px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
        <span style="font-size: 11px; font-weight: 700; color: #555;">商品 ${prodIdx + 1}</span>
      </div>
      <div style="display: flex; gap: 6px; margin-bottom: 6px; align-items: center;">
        <img class="prod-thumb" id="th-one-${prodIdx}" src="${enc(prod.img)}" alt="" style="width: 32px; height: 32px; object-fit: contain; border: 1px solid #e5e5e5; border-radius: 4px; background: #f5f5f5; flex-shrink: 0;">
        <select class="prod-sel" style="flex: 1;" onchange="onOneProdId(${prodIdx}, this.value)">
          ${opts(p.prodId)}
        </select>
      </div>
      ${roleSelect}
      ${giftLabelInput}
      ${usageInput}
      ${deleteBtn}
    </div>
  `;
}

function addOneProd() {
  if (state.one[0].products.length < 3) {
    const np = { prodId: (PRODUCTS[0] && PRODUCTS[0].id) || '', role: 'sub', giftLabel: '致贈', usage: '' };
    setProductUsage(np);
    state.one[0].products.push(np);
    applyOneMeta();
    buildEditorBlocks();
    renderDM();
  }
}

function deleteOneProd(idx) {
  state.one[0].products.splice(idx, 1);
  applyOneMeta();
  buildEditorBlocks();
  renderDM();
}

/* 帶入單一商品自己的用途（換商品時用，不影響其他商品已手改的用途） */
function setProductUsage(prod) {
  const cp = getCopy(prod.prodId);
  prod.usage = cp ? cp.usage : '';
}

/* 一格：標題取「主商品」介紹；原價＝所有所選商品建議售價加總，定價預設＝原價（無則 5000）。
   用途為各商品各自擁有（見 setProductUsage），此處不更動。 */
function applyOneMeta() {
  const c = state.one[0];
  const main = c.products.find(p => p.role === 'main');
  const cp = main ? getCopy(main.prodId) : null;
  c.headline = cp ? cp.intro : '';
  applyPricing(c, c.products.map(p => p.prodId));
}

function onOneProdId(idx, val) {
  const prod = state.one[0].products[idx];
  prod.prodId = val;
  setProductUsage(prod);   // 換商品→帶入該商品自己的用途
  applyOneMeta();          // 主商品可能變→標題；價格加總
  buildEditorBlocks();
  renderDM();
}

function onOneProdRole(idx, role) {
  state.one[0].products[idx].role = role;
  applyOneMeta();          // 主商品改變→標題；用途維持各商品自己的
  buildEditorBlocks();
  renderDM();
}

function onOneProdField(idx, field, val) {
  state.one[0].products[idx][field] = val;
  renderDM();
}

function setLayout(l) {
  taglines[layout] = document.getElementById('dm-tagline')?.value || '';
  subtitles[layout] = document.getElementById('dm-subtitle')?.value || '';
  layout = l;
  ['four','two','one'].forEach(k =>
    document.getElementById('opt-'+k).classList.toggle('active', k === l));
  document.getElementById('dm-tagline').value = taglines[l];
  const subtitleField = document.getElementById('dm-subtitle-field');
  const subtitleInput = document.getElementById('dm-subtitle');
  if (subtitleField) subtitleField.style.display = l === 'one' ? '' : 'none';
  if (subtitleInput) subtitleInput.value = subtitles[l];
  buildEditorBlocks();
  renderDM();
}

function toggleEditor() {
  const ep = document.getElementById('editorPane');
  ep.style.display = ep.style.display === 'none' ? 'flex' : 'none';
  setTimeout(scaleSheet, 50);
}

/* ══════════════════════════════════════════════
   SCALING  (vertical + horizontal centre)
══════════════════════════════════════════════ */
function scaleSheet() {
  const pane = document.getElementById('previewPane');
  const wrap = document.getElementById('dmWrap');
  const scale = Math.min(
    (pane.offsetWidth  - 48) / 595,
    (pane.offsetHeight - 36) / 842
  );
  wrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

/* ══════════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════════ */
async function generateCanvas() {
  const host = document.createElement('div');
  host.style.cssText = 'position:fixed;top:-9999px;left:0;pointer-events:none;';
  const proxy = document.createElement('div');
  proxy.style.cssText =
    'width:595px;height:842px;display:flex;flex-direction:column;' +
    'background:white;overflow:hidden;flex-shrink:0;';
  proxy.innerHTML = document.getElementById('dm-sheet').innerHTML;
  host.appendChild(proxy);
  document.body.appendChild(host);

  try {
    // Wait for images inside the proxy to finish loading (may already be cached)
    await Promise.all([...proxy.querySelectorAll('img')].map(img =>
      img.complete ? Promise.resolve() :
        new Promise(r => { img.onload = r; img.onerror = r; })
    ));
    await new Promise(r => requestAnimationFrame(r));

    const canvas = await html2canvas(proxy, {
      scale: 2,
      width: 595,
      height: 842,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });
    return canvas;
  } finally {
    document.body.removeChild(host);
  }
}

async function exportPDF() {
  const btns = [...document.querySelectorAll('.nav-btn, .btn-export-main')];
  btns.forEach(b => { b.dataset.orig = b.innerHTML; b.innerHTML = '產生中&hellip;'; b.disabled = true; });

  try {
    const canvas = await generateCanvas();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
    pdf.save("O'right PRO DM.pdf");
  } catch (e) {
    console.error('PDF export failed:', e);
    alert('PDF 產生失敗，請改用瀏覽器列印（Ctrl+P / 分享→列印）。');
  } finally {
    btns.forEach(b => { b.innerHTML = b.dataset.orig; b.disabled = false; });
  }
}

async function exportJPG() {
  const btns = [...document.querySelectorAll('.nav-btn, .btn-export-main')];
  btns.forEach(b => { b.dataset.orig = b.innerHTML; b.innerHTML = '產生中&hellip;'; b.disabled = true; });

  try {
    const canvas = await generateCanvas();
    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
    const link = document.createElement('a');
    link.download = "O'right PRO DM.jpg";
    link.href = dataUrl;
    link.click();
  } catch (e) {
    console.error('JPG export failed:', e);
    alert('JPG 產生失敗。');
  } finally {
    btns.forEach(b => { b.innerHTML = b.dataset.orig; b.disabled = false; });
  }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
window.addEventListener('load', () => {
  // 以 Excel 文案套用初始預設（標題/用途/原價加總/定價＝原價或 5000）
  state.four.forEach(applyMainCopy);
  state.two.forEach(applyMainCopy);
  state.one[0].products.forEach(setProductUsage);
  applyOneMeta();
  buildEditorBlocks();
  renderDM();
  scaleSheet();
});
window.addEventListener('resize', scaleSheet);
</script>
