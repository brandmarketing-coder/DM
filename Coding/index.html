<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'right PRO | DM 編輯器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', '微軟正黑體', 'Microsoft JhengHei', sans-serif;
  background: #e2e0dc; height: 100vh; overflow: hidden; color: #333;
}

/* ── Navbar ── */
.navbar {
  height: 52px; background: #1c1c1c; color: white;
  display: flex; align-items: center; padding: 0 20px; gap: 10px;
  flex-shrink: 0; user-select: none;
}
.nav-logo { font-size: 14px; letter-spacing: 1px; color: white; font-weight: 400; display: flex; align-items: center; gap: 4px; }
.nav-logo .dot { width: 9px; height: 9px; background: #7ec850; border-radius: 50%; }
.nav-title { font-size: 13px; color: #888; font-weight: 300; }
.nav-spacer { flex: 1; }
.nav-btn {
  padding: 6px 14px; border-radius: 6px; cursor: pointer; border: none;
  font-size: 12px; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 5px; transition: background 0.15s;
}
.nav-btn-export { background: #3a7d44; color: white; }
.nav-btn-export:hover { background: #2d6235; }
.nav-btn-preview { background: transparent; color: #bbb; border: 1px solid #444; }
.nav-btn-preview:hover { border-color: #888; color: white; }

/* ── Workspace ── */
.workspace { display: flex; height: calc(100vh - 52px); }

/* ── Preview Pane ── */
.preview-pane { flex: 1; background: #d0cdc9; position: relative; overflow: hidden; }

/* ── DM Sheet wrapper: absolutely centred ── */
.dm-wrap {
  position: absolute; top: 50%; left: 50%;
  transform-origin: center center; /* transform set by JS */
}

/* ══════════════════════════════════════════
   DM SHEET  (A4: 595 × 842 px)
══════════════════════════════════════════ */
#dm-sheet {
  width: 595px; height: 842px;
  display: flex; flex-direction: column;
  background: white;
  box-shadow: 0 8px 40px rgba(0,0,0,0.28);
  overflow: hidden; /* hard clip — no scrollbars ever */
}

/* Header / Footer images */
.dm-hdr, .dm-ftr { flex-shrink: 0; line-height: 0; width: 100%; }
.dm-hdr img, .dm-ftr img { width: 100%; display: block; }

/* Content zone */
.dm-content { flex: 1; min-height: 0; display: flex; flex-direction: column; background: white; overflow: hidden; }

/* Tagline */
.dm-tagline {
  flex-shrink: 0;
  text-align: center; padding: 11px 24px 5px;
  font-size: 13px; letter-spacing: 4px; color: #666; font-weight: 300;
}

/* ══════════════════════════════════════════
   FOUR-GRID  (2 × 2 independent cells)
══════════════════════════════════════════ */
.dm-four-grid {
  flex: 1; min-height: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  padding: 2px 6px 6px;
}

.dm-cell {
  display: flex; flex-direction: column;
  padding: 8px 12px 8px;
  min-height: 0; overflow: hidden;
}
/* inner borders */
.dm-cell:nth-child(1),
.dm-cell:nth-child(3) { border-right: 1px solid #dedad6; }
.dm-cell:nth-child(1),
.dm-cell:nth-child(2) { border-bottom: 1px solid #dedad6; }

/* Image area — fixed height so text is never squeezed out */
.dm-cell-imgs {
  height: 152px; flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 4px; overflow: hidden;
}
.dm-cell-img-slot {
  min-width: 0;
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
  height: 100%;
}
.dm-cell-img-slot img {
  max-width: 100%; max-height: 100%; object-fit: contain; display: block;
}
.dm-cell-img-slot.is-main { flex: 0 0 88px; }
.dm-cell-img-slot.is-gift  { flex: 0 0 56px; }
.dm-cell-img-slot.is-main:only-child { flex: 0 0 auto; max-width: 130px; }

/* Cell text */
.dm-cell-text { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: flex-end; padding-top: 4px; }
.dm-cell-headline { font-size: 11px; font-weight: 700; color: #1a1a1a; line-height: 1.35; margin-bottom: 2px; }
.dm-cell-names { font-size: 8.5px; color: #aaa; line-height: 1.5; margin-bottom: 3px; }
.dm-cell-gift-name { color: #c0bbb5; }
.dm-cell-price-row { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
.dm-cell-price     { font-size: 17px; font-weight: 400; color: #1a1a1a; letter-spacing: 0.3px; }
.dm-cell-unit      { font-size: 11px; color: #555; }
.dm-cell-orig      { font-size: 8.5px; color: #c0bbb5; }

/* ══════════════════════════════════════════
   TWO-GRID  (2 stacked bundles)
══════════════════════════════════════════ */
.dm-two-rows { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.dm-bundle-row {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 8px 28px 10px; overflow: hidden;
}
.dm-bundle-row + .dm-bundle-row { border-top: 1px solid #dedad6; }

/* Products — each product is a column: image above, name below, bottoms aligned */
.dm-bundle-pair {
  flex: 1; min-height: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 20px; overflow: hidden; padding-bottom: 2px;
}
.dm-bprod { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.dm-bprod-img {
  display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
}
.dm-bprod-img img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.dm-gift-badge {
  font-size: 10px; background: #19322F; color: white;
  padding: 2px 9px 2px 10px; border-radius: 9px; margin-bottom: 14px;
  letter-spacing: 1px; font-style: normal; line-height: 1.4;
}
.dm-bprod-name {
  font-size: 9.5px; color: #999; text-align: center;
  margin-top: 5px; line-height: 1.3;
}
/* Two-grid image sizes: gift ~2/3 height of main, bottoms align via flex-end on parent */
.dm-bundle-pair .dm-bprod.is-main .dm-bprod-img { width: 118px; height: 152px; }
.dm-bundle-pair .dm-bprod.is-gift .dm-bprod-img  { width: 78px;  height: 102px; }
.dm-bundle-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: 130px; height: 165px; }

/* Bundle price */
.dm-bundle-price-row {
  flex-shrink: 0; display: flex; align-items: baseline;
  gap: 8px; flex-wrap: wrap; padding-top: 5px;
  justify-content: center;
}
.dm-headline-lbl { font-size: 12px; color: #555; letter-spacing: 0.5px; }
.dm-price-num   { font-size: 26px; font-weight: 400; color: #1a1a1a; letter-spacing: 0.3px; }
.dm-price-unit  { font-size: 15px; color: #444; }
.dm-orig-price  { font-size: 10px; color: #c0bbb5; }

/* ══════════════════════════════════════════
   ONE-GRID  (single centred product)
══════════════════════════════════════════ */
.dm-one-block {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 36px 14px; overflow: hidden;
}

/* One-grid pair: same column structure as two-grid, larger sizes */
.dm-one-pair {
  flex-shrink: 0;
  display: flex; align-items: flex-end; justify-content: center;
  gap: 24px; overflow: hidden;
}
.dm-one-pair .dm-bprod.is-main .dm-bprod-img  { width: 190px; height: 268px; }
.dm-one-pair .dm-bprod.is-gift .dm-bprod-img   { width: 128px; height: 180px; }
.dm-one-pair .dm-bprod.is-main:only-child .dm-bprod-img { width: 220px; height: 310px; }
.dm-one-pair .dm-bprod-name { font-size: 10.5px; }

.dm-one-price-row {
  flex-shrink: 0;
  display: flex; align-items: baseline;
  gap: 8px; flex-wrap: wrap; padding-top: 10px;
  justify-content: center;
}

/* ══════════════════════════════════════════
   EDITOR PANE
══════════════════════════════════════════ */
.editor-pane {
  width: 390px; flex-shrink: 0;
  background: white; border-left: 1px solid #d0cdc9;
  display: flex; flex-direction: column; overflow: hidden;
}
.editor-scroll { flex: 1; overflow-y: auto; }
.editor-sec { padding: 14px 14px 12px; border-bottom: 1px solid #eee; }
.editor-sec-num { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 12px; }

/* Layout picker */
.layout-pick { display: flex; gap: 8px; }
.layout-opt {
  flex: 1; border: 2px solid #e2e2e2; border-radius: 8px;
  padding: 9px 6px; cursor: pointer; text-align: center;
  transition: border-color 0.15s, background 0.15s;
}
.layout-opt:hover { border-color: #5aaa6a; }
.layout-opt.active { border-color: #3a7d44; background: #f0f7f1; }
.lt-thumb {
  width: 46px; height: 56px; margin: 0 auto 6px;
  background: #ddd; display: grid; gap: 2px; padding: 4px; border-radius: 2px;
}
.lt-thumb.lt4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.lt-thumb.lt2 { grid-template-columns: 1fr;     grid-template-rows: 1fr 1fr; }
.lt-thumb.lt1 { grid-template-columns: 1fr;     grid-template-rows: 1fr; }
.lt-thumb > div { background: white; border-radius: 1px; }
.lt-label { font-size: 12px; color: #666; }
.layout-opt.active .lt-label { color: #3a7d44; font-weight: 600; }

/* Fields */
.field-lbl { font-size: 10.5px; color: #888; margin-bottom: 3px; display: block; }
.field-input {
  width: 100%; padding: 6px 9px; border: 1px solid #ddd; border-radius: 5px;
  font-size: 12px; color: #333; outline: none; background: #fafafa;
  transition: border-color 0.15s;
}
.field-input:focus { border-color: #5aaa6a; background: white; }

/* Block editor */
.block-ed {
  background: #f8f7f5; border-radius: 7px; padding: 10px 10px 9px;
  margin-top: 10px; border: 1px solid #ede9e5;
}
.block-ed-title { font-size: 10.5px; font-weight: 700; color: #555; margin-bottom: 9px; }

.prod-pair { display: flex; gap: 7px; margin-bottom: 8px; }
.prod-slot { flex: 1; min-width: 0; }
.prod-slot-lbl { font-size: 9.5px; color: #aaa; margin-bottom: 3px; }
.prod-thumb-row { display: flex; align-items: center; gap: 4px; margin-bottom: 3px; }
.prod-thumb {
  width: 30px; height: 30px; object-fit: contain;
  border: 1px solid #e5e5e5; border-radius: 4px; background: #f5f5f5; flex-shrink: 0;
}
.prod-sel {
  width: 100%; padding: 4px 5px; border: 1px solid #ddd; border-radius: 4px;
  font-size: 9.5px; color: #333; background: white; outline: none;
}
.prod-sel:focus { border-color: #5aaa6a; }

.price-pair { display: flex; gap: 7px; margin-top: 2px; }
.price-slot { flex: 1; }
.price-slot label { font-size: 9.5px; color: #aaa; display: block; margin-bottom: 2px; }
.price-input {
  width: 100%; padding: 5px 7px; border: 1px solid #ddd; border-radius: 4px;
  font-size: 12px; outline: none; background: #fafafa;
}
.price-input:focus { border-color: #5aaa6a; background: white; }

.headline-field { margin-bottom: 7px; }

/* Export */
.editor-footer { flex-shrink: 0; }
.btn-export-main {
  display: block; width: 100%; padding: 14px;
  background: #3a7d44; color: white; border: none;
  font-size: 13px; letter-spacing: 1px; cursor: pointer; transition: background 0.15s;
}
.btn-export-main:hover { background: #2d6235; }
.export-note { font-size: 9.5px; color: #bbb; text-align: center; padding: 6px 10px; }

/* ── Responsive ── */

/* Medium: tablet landscape / small laptop — keep side-by-side, narrow editor */
@media (max-width: 960px) {
  .editor-pane { width: 300px; }
  .block-ed { padding: 8px 8px 7px; }
}

/* Small: tablet portrait / mobile — stack vertically, page scrolls */
@media (max-width: 700px) {
  body { height: auto; overflow: auto; }

  /* Navbar wraps if needed */
  .navbar { height: auto; flex-wrap: wrap; padding: 8px 14px; gap: 6px; }
  .nav-spacer { flex: 1 0 100%; display: none; }
  .nav-title { display: none; }

  /* Stack preview above editor */
  .workspace { flex-direction: column; height: auto; overflow: visible; }

  /* Preview: fixed height so the scaled A4 always shows */
  .preview-pane { flex: none; height: 380px; min-height: 0; }

  /* Editor: full width, flows in document */
  .editor-pane {
    width: 100%; height: auto;
    border-left: none; border-top: 1px solid #d0cdc9;
    overflow: visible; flex-shrink: 0;
  }
  .editor-scroll { overflow-y: visible; height: auto; }

  /* Product selector pair: stack vertically so dropdowns are full width */
  .prod-pair { flex-direction: column; gap: 6px; }
  .prod-sel { font-size: 11px; }

  /* Layout picker: stay horizontal, allow small size */
  .lt-thumb { width: 36px; height: 44px; }
  .lt-label { font-size: 11px; }
}

/* ── Print ── */
@media print {
  @page { size: 210mm 297mm; margin: 0; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  /*
   * Chrome prints at 96dpi → A4 = 793 × 1122 CSS px.
   * Our sheet is designed at 595 × 842 px (screen preview).
   * zoom: 1.334 scales 595 × 1.334 = 793 px  &  842 × 1.334 = 1123 px,
   * filling A4 exactly while preserving every fixed-px proportion.
   */
  html {
    zoom: 1.333; /* 842 × 1.333 = 1122.5 px = A4 height at 96 dpi — exact fit */
    width: 595px !important; height: auto !important;
    overflow: visible !important;
    margin: 0 !important; padding: 0 !important;
    background: none !important;
  }
  body {
    width: 595px !important; height: auto !important;
    overflow: visible !important;
    background: none !important; margin: 0 !important; padding: 0 !important;
  }
  .navbar, .editor-pane { display: none !important; }
  .workspace {
    display: block !important; width: 595px !important;
    height: auto !important; overflow: visible !important;
  }
  .preview-pane {
    position: static !important; display: block !important;
    background: none !important; overflow: visible !important;
    width: 595px !important; height: auto !important;
    padding: 0 !important; margin: 0 !important;
  }
  .dm-wrap {
    position: static !important; transform: none !important;
    display: block !important;
    margin: 0 !important; padding: 0 !important;
  }
  #dm-sheet {
    width: 595px !important; height: 842px !important;
    box-shadow: none !important; overflow: visible !important;
    display: flex !important;
  }
}
</style>
</head>

   two   → cells[0..1]  (2 rows)
   one   → cells[0]     (single)
══════════════════════════════════════════════ */

const mkCell = (pid, gid, hl, price, orig, gl) => ({
  prodId: pid, giftId: gid||'', headline: hl||'', price: price||'', origPrice: orig||'',
  giftLabel: gl || '致贈'
});

    mkCell('sh2-500', 'mini10', '豐盈彈韌 輕盈飽滿', '3,800', '6,200'),
    mkCell('sh3-500', 'mini10', '修護受損 重建結構', '3,800', '6,200'),

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
const getProd = id => PRODUCTS.find(p => p.id === id) || PRODUCTS[0];
const getProdOrNull = id => id ? (PRODUCTS.find(p => p.id === id) || null) : null;

function fmt(v) {
  const n = v ? v.toString().replace(/,/g, '') : '';
  if (!n || isNaN(Number(n)) || n === '0') return n || '0';
  return Number(n).toLocaleString('zh-TW');
}

function enc(path) {
  return path.split('/').map((s, i) => i === 0 ? s : encodeURIComponent(s)).join('/');
}

/* ══════════════════════════════════════════════
   DM RENDER — FOUR  (2×2 grid, 4 independent cells)
══════════════════════════════════════════════ */
function cellHTML(c) {
  const mp = getProd(c.prodId);
  const gp = getProdOrNull(c.giftId);

  const giftSlot = gp ? `
    <div class="dm-cell-img-slot is-gift">
      <img src="${enc(gp.img)}" alt="${gp.name}" onerror="this.style.opacity=0.1">
    </div>` : '';

  const giftName = gp ? `<br><span class="dm-cell-gift-name">（${c.giftLabel}）${gp.name}</span>` : '';

  const orig = c.origPrice && c.origPrice !== '0'
    ? `<span class="dm-cell-orig">原價NT$${fmt(c.origPrice)}</span>` : '';

  return `
    <div class="dm-cell">
      <div class="dm-cell-imgs">
        <div class="dm-cell-img-slot is-main">
          <img src="${enc(mp.img)}" alt="${mp.name}" onerror="this.style.opacity=0.1">
        </div>
        ${giftSlot}
      </div>
      <div class="dm-cell-text">
        ${c.headline ? `<div class="dm-cell-headline">${c.headline}</div>` : ''}
        <div class="dm-cell-names">${mp.name}${giftName}</div>
        <div class="dm-cell-price-row">
          <span class="dm-cell-price">${fmt(c.price)}</span>
          <span class="dm-cell-unit">元</span>
          ${orig}
        </div>
      </div>
    </div>`;
}

function renderFour(tag) {
  return `
    <div class="dm-content">
      <div class="dm-tagline">${tag}</div>
      <div class="dm-four-grid">
        ${state.four.map(cellHTML).join('')}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   DM RENDER — TWO  (2 stacked bundles)
══════════════════════════════════════════════ */
function bundleRowHTML(c) {
  const mp = getProd(c.prodId);
  const gp = getProdOrNull(c.giftId);

  const giftCol = gp ? `
    <div class="dm-bprod is-gift">
      <div class="dm-gift-badge">${c.giftLabel}</div>
      <div class="dm-bprod-img">
        <img src="${enc(gp.img)}" alt="${gp.name}" onerror="this.style.opacity=0.1">
      </div>
      <div class="dm-bprod-name">${gp.name}</div>
    </div>` : '';

  const orig = c.origPrice && c.origPrice !== '0'
    ? `<span class="dm-orig-price">（原價NT$${fmt(c.origPrice)}）</span>` : '';

  const hl = c.headline
    ? `<span class="dm-headline-lbl">${c.headline}</span>` : '';

  return `
    <div class="dm-bundle-row">
      <div class="dm-bundle-pair">
        <div class="dm-bprod is-main">
          <div class="dm-bprod-img">
            <img src="${enc(mp.img)}" alt="${mp.name}" onerror="this.style.opacity=0.1">
          </div>
          <div class="dm-bprod-name">${mp.name}</div>
        </div>
        ${giftCol}
      </div>
      <div class="dm-bundle-price-row">
        ${hl}
        <span class="dm-price-num">${fmt(c.price)}</span>
        <span class="dm-price-unit">元</span>
        ${orig}
      </div>
    </div>`;
}

function renderTwo(tag) {
  return `
    <div class="dm-content">
      <div class="dm-tagline">${tag}</div>
      <div class="dm-two-rows">
        ${bundleRowHTML(state.two[0])}
        ${bundleRowHTML(state.two[1])}

/* ══════════════════════════════════════════════
   DM RENDER — ONE  (single centred)
══════════════════════════════════════════════ */

/* ══════════════════════════════════════════════
   MAIN RENDER

const HDR = '../沙龍DM公版/公版DM_1.jpg';
const FTR = '../沙龍DM公版/公版DM_2.jpg';

function renderDM() {
  const tag = document.getElementById('dm-tagline')?.value || '';
  const body = layout === 'four' ? renderFour(tag)
             : layout === 'two'  ? renderTwo(tag)
             : renderOne(tag);
  document.getElementById('dm-sheet').innerHTML =
    `<div class="dm-hdr"><img src="${enc(HDR)}" alt="header"></div>` +
    body +
    `<div class="dm-ftr"><img src="${enc(FTR)}" alt="footer"></div>`;
}

/* ══════════════════════════════════════════════
   EDITOR BLOCKS
══════════════════════════════════════════════ */
function opts(selectedId) {
  return PRODUCTS.map(p =>
    `<option value="${p.id}" ${p.id === selectedId ? 'selected' : ''}>${p.name}</option>`

function cellEditor(idx, title) {
  const c = state[layout][idx], mp = getProd(c.prodId);
  const gp = c.giftId ? getProd(c.giftId) : PRODUCTS[0];

          <div class="prod-slot-lbl">主商品</div>
          <div class="prod-thumb-row">
            <img class="prod-thumb" id="th${idx}m" src="${enc(mp.img)}" alt="">
          </div>
          <select class="prod-sel" onchange="onProd(${idx},'prodId',this.value)">
            ${opts(c.prodId)}
          </select>
        </div>
        <div class="prod-slot">
          <div class="prod-slot-lbl">贈品（可不選）</div>
          <div class="prod-thumb-row">
            <img class="prod-thumb" id="th${idx}g" src="${enc(gp.img)}" alt="">

          <select class="prod-sel" onchange="onProd(${idx},'giftId',this.value)">
            <option value="">— 不顯示贈品 —</option>
            ${opts(c.giftId)}
          </select>
        </div>
      </div>
      <div class="gift-label-field" id="gl-field-${idx}" style="${c.giftId ? '' : 'display:none'}">
        <label class="field-lbl">贈品標籤文字（如：致贈、附贈、組合）</label>
        <input type="text" class="field-input" style="padding:5px 8px"

          oninput="onField(${idx},'giftLabel',this.value)">
      </div>
      <div class="headline-field">
        <label class="field-lbl">標題／促銷標語（選填）</label>
        <input type="text" class="field-input" style="padding:5px 8px"
          value="${c.headline}" placeholder="例：強健髮根 甦醒美麗"
          oninput="onField(${idx},'headline',this.value)">
      </div>
      <div class="price-pair">
        <div class="price-slot">
          <label>售價（元）</label>
          <input type="text" class="price-input" value="${c.price}"
            oninput="onField(${idx},'price',this.value)">
        </div>
        <div class="price-slot">
          <label>原價（元）</label>
          <input type="text" class="price-input" value="${c.origPrice}"
            oninput="onField(${idx},'origPrice',this.value)">
        </div>
      </div>
    </div>`;
}

function buildEditorBlocks() {
  let html = '';
  if (layout === 'four') {
    html = cellEditor(0,'格 A（左上）') + cellEditor(1,'格 B（右上）') +
           cellEditor(2,'格 C（左下）') + cellEditor(3,'格 D（右下）');
  } else if (layout === 'two') {
    html = cellEditor(0,'上方區塊') + cellEditor(1,'下方區塊');
  } else {
    html = cellEditor(0,'商品');
  }
  document.getElementById('block-editors').innerHTML = html;
}

/* ══════════════════════════════════════════════
   EVENT HANDLERS
══════════════════════════════════════════════ */
function onProd(idx, field, val) {
  state[layout][idx][field] = val;
  const tid = field === 'prodId' ? `th${idx}m` : `th${idx}g`;
  const th = document.getElementById(tid);
  if (th) {
    const p = val ? getProd(val) : null;
    th.src = p ? enc(p.img) : '';
  }
  if (field === 'giftId') {
    const glField = document.getElementById(`gl-field-${idx}`);
    if (glField) glField.style.display = val ? '' : 'none';
  }
  renderDM();
}

function onField(idx, field, val) {
  state[layout][idx][field] = val;
  renderDM();
}

function setLayout(l) {
  taglines[layout] = document.getElementById('dm-tagline')?.value || '';
  layout = l;
  ['four','two','one'].forEach(k =>
    document.getElementById('opt-'+k).classList.toggle('active', k === l));
  document.getElementById('dm-tagline').value = taglines[l];
  buildEditorBlocks();
  renderDM();
}

function toggleEditor() {
  const ep = document.getElementById('editorPane');
  ep.style.display = ep.style.display === 'none' ? 'flex' : 'none';
  setTimeout(scaleSheet, 50);
}

/* ══════════════════════════════════════════════
   SCALING  (vertical + horizontal centre)
══════════════════════════════════════════════ */
function scaleSheet() {
  const pane = document.getElementById('previewPane');
  const wrap = document.getElementById('dmWrap');
  const scale = Math.min(
    (pane.offsetWidth  - 48) / 595,
    (pane.offsetHeight - 36) / 842
  );
  wrap.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

/* ══════════════════════════════════════════════
   PDF EXPORT
══════════════════════════════════════════════ */
async function exportPDF() {
  const btns = [...document.querySelectorAll('.nav-btn-export, .btn-export-main')];
  btns.forEach(b => { b.dataset.orig = b.innerHTML; b.innerHTML = '產生中&hellip;'; b.disabled = true; });

  /* Build an isolated, transform-free proxy for html2canvas.
     The live #dm-sheet sits inside .dm-wrap which has a CSS scale() transform;
     getBoundingClientRect() would return the shrunken visual size and cause
     distorted output. We copy the innerHTML into a plain div at natural 595×842px
     with no ancestor transform, positioned off-screen so the user sees nothing. */
  const host = document.createElement('div');
  host.style.cssText = 'position:fixed;top:-9999px;left:0;pointer-events:none;';
  const proxy = document.createElement('div');
  proxy.style.cssText =
    'width:595px;height:842px;display:flex;flex-direction:column;' +
    'background:white;overflow:hidden;flex-shrink:0;';
  proxy.innerHTML = document.getElementById('dm-sheet').innerHTML;
  host.appendChild(proxy);
  document.body.appendChild(host);

  try {
    // Wait for images inside the proxy to finish loading (may already be cached)
    await Promise.all([...proxy.querySelectorAll('img')].map(img =>
      img.complete ? Promise.resolve() :
        new Promise(r => { img.onload = r; img.onerror = r; })
    ));
    await new Promise(r => requestAnimationFrame(r));

    const canvas = await html2canvas(proxy, {
      scale: 2,
      width: 595,
      height: 842,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
    pdf.save("O'right PRO DM.pdf");

  } catch (e) {
    console.error('PDF export failed:', e);
    alert('PDF 產生失敗，請改用瀏覽器列印（Ctrl+P / 分享→列印）。');
  } finally {
    document.body.removeChild(host);
    btns.forEach(b => { b.innerHTML = b.dataset.orig; b.disabled = false; });
  }
}
